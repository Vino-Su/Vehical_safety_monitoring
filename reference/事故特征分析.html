<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事故特征分析系统</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet.heat -->
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <!-- WordCloud2 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.0.2/wordcloud2.min.js"></script>
    <style>
        :root {
            --primary: #1890ff;
            --primary-hover: #40a9ff;
            --primary-bg: #e6f7ff;
            --success: #52c41a;
            --warning: #faad14;
            --error: #f5222d;
            --text-primary: #262626;
            --text-secondary: #595959;
            --text-tertiary: #8c8c8c;
            --border: #d9d9d9;
            --border-light: #f0f0f0;
            --bg: #f0f2f5;
            --bg-white: #fff;
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.03),0 1px 6px -1px rgba(0,0,0,0.02);
            --shadow-lg: 0 6px 16px -8px rgba(0,0,0,0.08),0 9px 28px 0 rgba(0,0,0,0.05);
            --radius: 6px;
            --radius-lg: 8px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:var(--font); background:var(--bg); color:var(--text-primary); line-height:1.5; }
        .app-header { background:#001529; color:#fff; padding:0 32px; height:56px; display:flex; align-items:center; position:sticky; top:0; z-index:100; }
        .app-header .logo { display:flex; align-items:center; gap:12px; font-size:18px; font-weight:600; }
        .app-header .logo .icon { width:34px; height:34px; border-radius:var(--radius); background:var(--primary); display:flex; align-items:center; justify-content:center; font-size:20px; }
        .app-body { max-width:1500px; margin:0 auto; padding:20px 28px 40px; }
        .tab-nav { display:flex; gap:0; background:var(--bg-white); border-radius:var(--radius-lg); padding:4px; margin-bottom:20px; box-shadow:var(--shadow-sm); border:1px solid var(--border-light); }
        .tab-btn { flex:1; padding:11px 16px; border:none; background:transparent; cursor:pointer; font-size:14px; font-weight:500; color:var(--text-secondary); border-radius:var(--radius); transition:0.2s; display:flex; align-items:center; justify-content:center; gap:7px; }
        .tab-btn:hover { color:var(--primary); background:var(--primary-bg); }
        .tab-btn.active { color:#fff; background:var(--primary); box-shadow:0 2px 6px rgba(24,144,255,0.35); font-weight:600; }
        .tab-content { display:none; animation:fadeIn 0.35s; }
        .tab-content.active { display:block; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
        .query-bar { background:var(--bg-white); border-radius:var(--radius-lg); padding:16px 22px; margin-bottom:18px; display:flex; flex-wrap:wrap; align-items:flex-end; gap:14px; box-shadow:var(--shadow-sm); border:1px solid var(--border-light); }
        .form-group { display:flex; flex-direction:column; gap:5px; min-width:130px; }
        .form-group label { font-size:12px; font-weight:500; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.5px; }
        select, input { height:34px; padding:0 10px; border:1px solid var(--border); border-radius:4px; font-size:13px; font-family:var(--font); color:var(--text-primary); background:#fff; outline:none; min-width:120px; }
        select:focus, input:focus { border-color:var(--primary); box-shadow:0 0 0 2px rgba(24,144,255,0.12); }
        .btn { height:34px; padding:0 18px; border:none; border-radius:4px; cursor:pointer; font-size:13px; font-weight:500; font-family:var(--font); transition:0.2s; display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-primary:hover { background:var(--primary-hover); }
        .btn-outline { background:#fff; color:var(--primary); border:1px solid var(--primary); }
        .btn-outline:hover { background:var(--primary-bg); }
        .btn-sm { height:28px; padding:0 12px; font-size:12px; }
        .btn-link { background:transparent; color:var(--primary); border:none; padding:0 4px; height:auto; cursor:pointer; font-weight:500; font-size:12px; }
        .card { background:var(--bg-white); border-radius:var(--radius-lg); padding:20px; box-shadow:var(--shadow-sm); border:1px solid var(--border-light); margin-bottom:18px; }
        .card-header { font-size:14px; font-weight:600; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; }
        .chart-container { min-height:280px; }
        .row-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        .row-1 { display:grid; grid-template-columns:1fr; gap:16px; }
        .table-wrap { overflow-x:auto; margin-top:10px; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th { background:#fafafa; padding:10px 14px; text-align:left; font-weight:600; color:var(--text-secondary); border-bottom:1px solid var(--border-light); white-space:nowrap; font-size:12px; text-transform:uppercase; }
        td { padding:10px 14px; border-bottom:1px solid #f5f5f5; }
        tbody tr:hover { background:#fafafa; }
        .tag { display:inline-block; padding:2px 10px; border-radius:10px; font-size:11px; font-weight:500; }
        .tag-red { background:#fff1f0; color:#cf1322; }
        .tag-orange { background:#fff7e6; color:#d46b08; }
        .tag-blue { background:#e6f7ff; color:#096dd9; }
        .tag-purple { background:#f9f0ff; color:#722ed1; }
        .tag-green { background:#f6ffed; color:#389e0d; }
        .modal-mask { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.45); z-index:200; align-items:center; justify-content:center; }
        .modal-mask.show { display:flex; }
        .modal { background:#fff; border-radius:8px; width:680px; max-height:80vh; display:flex; flex-direction:column; box-shadow:var(--shadow-lg); }
        .modal-header { padding:16px 24px; border-bottom:1px solid var(--border-light); display:flex; align-items:center; justify-content:space-between; font-weight:600; }
        .modal-body { padding:16px 24px; overflow-y:auto; flex:1; }
        #tagCloudCanvas { width:100%; height:200px; }
        @media (max-width:1000px) { .row-2 { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<header class="app-header"><div class="logo"><span class="icon">📊</span>事故特征分析系统</div></header>
<div class="app-body">
    <nav class="tab-nav" id="tabNav">
        <button class="tab-btn active" data-tab="tab-st">🌐 事故时空特征</button>
        <button class="tab-btn" data-tab="tab-search">🔎 事故关联检索</button>
        <button class="tab-btn" data-tab="tab-profile">🧩 多维特征画像</button>
        <button class="tab-btn" data-tab="tab-collision">💥 碰撞形态分析</button>
    </nav>

    <!-- ========== 时空特征（布局已调整） ========== -->
    <div class="tab-content active" id="tab-st">
        <div class="query-bar">
            <div class="form-group"><label>时间范围</label><input type="date" value="2026-04-01"> - <input type="date" value="2026-05-08"></div>
            <div class="form-group"><label>行政区</label><select><option>全部</option><option>樊城区</option><option>襄城区</option></select></div>
            <div class="form-group"><label>事故类型</label><select multiple><option selected>全部</option><option>碰撞</option><option>追尾</option></select></div>
            <div class="form-group"><label>企业</label><select><option>全部企业</option><option>襄阳智行科技</option></select></div>
            <button class="btn btn-primary">查询</button>
            <button class="btn btn-outline">导出</button>
        </div>
        <!-- 第一行：24小时分布 + 星期分布 -->
        <div class="row-2">
            <div class="card"><div class="card-header">24小时分布 <select style="margin-left:8px;height:28px;"><option>工作日</option><option>非工作日</option></select></div><div class="chart-container" id="chartHour"></div></div>
            <div class="card"><div class="card-header">星期分布</div><div class="chart-container" id="chartWeekday"></div></div>
        </div>
        <!-- 第二行：月度趋势（全宽） -->
        <div class="row-1">
            <div class="card"><div class="card-header">月度趋势（多年度叠加）</div><div class="chart-container" id="chartMonth" style="height:320px;"></div></div>
        </div>
        <!-- 第三行：区域分布 + 道路等级分布 -->
        <div class="row-2">
            <div class="card"><div class="card-header">区域分布</div><div class="chart-container" id="chartRegion"></div></div>
            <div class="card"><div class="card-header">道路等级分布</div><div class="chart-container" id="chartRoadLevel"></div></div>
        </div>
        <!-- 第四行：事故热力图（全宽） -->
        <div class="row-1">
            <div class="card"><div class="card-header">事故热力图（地图） <span style="font-weight:400;font-size:12px;">可缩放拖拽</span></div><div id="mapContainer" style="height:420px;"></div></div>
        </div>
    </div>

    <!-- ========== 关联检索 ========== -->
    <div class="tab-content" id="tab-search">
        <div class="query-bar">
            <div class="form-group"><label>驾驶员/安全员</label><input placeholder="姓名"></div>
            <div class="form-group"><label>车牌/VIN</label><input placeholder="车牌或VIN"></div>
            <div class="form-group"><label>道路名称</label><input placeholder="路段"></div>
            <div class="form-group"><label>时间范围</label><input type="date"> - <input type="date"></div>
            <div class="form-group"><label>企业</label><select><option>全部</option><option>襄阳智行科技</option></select></div>
            <button class="btn btn-primary">检索</button>
        </div>
        <div class="card">
            <div class="card-header">事故列表 <span style="font-weight:400;font-size:12px;">共 247 条</span></div>
            <div class="table-wrap">
                <table><thead><tr><th>事故编号</th><th>时间</th><th>地点</th><th>类型</th><th>车牌</th><th>企业</th><th>驾驶员</th><th>操作</th></tr></thead>
                    <tbody id="searchTableBody"></tbody></table>
            </div>
        </div>
    </div>

    <!-- ========== 多维画像 ========== -->
    <div class="tab-content" id="tab-profile">
        <div class="query-bar">
            <div class="form-group"><label>画像维度</label><select><option>全局画像</option><option>襄阳智行科技</option></select></div>
        </div>
        <div class="row-2">
            <div class="card">
                <div class="card-header">交叉统计矩阵 
                    <span style="display:flex; gap:8px;">
                        <select id="profileX"><option>事故类型</option><option>车辆类型</option><option>测试场景</option><option>道路类型</option></select>
                        <span style="line-height:28px;">×</span>
                        <select id="profileY"><option>时段</option><option>伤亡等级</option><option>自动驾驶等级</option><option>驾驶模式</option></select>
                    </span>
                </div>
                <div class="chart-container" id="chartCrossMatrix"></div>
            </div>
            <div class="card">
                <div class="card-header">典型特征组合</div>
                <table><thead><tr><th>特征组合</th><th>事故数</th><th>占比</th><th>显著</th></tr></thead>
                    <tbody><tr><td>城区道路×自动驾驶×追尾×高峰</td><td>38</td><td>15.4%</td><td><span class="tag tag-green">是</span></td></tr>
                    <tr><td>次干路×手动驾驶×刮擦×平峰</td><td>22</td><td>8.9%</td><td><span class="tag tag-green">是</span></td></tr></tbody></table>
            </div>
        </div>
        <div class="row-2">
            <div class="card">
                <div class="card-header">单维度分布 <select id="singleDimSelect" style="margin-left:8px;height:28px;"><option>事故类型</option><option>车辆类型</option><option>测试场景</option><option>道路类型</option></select></div>
                <div class="chart-container" id="chartSingleDim"></div>
            </div>
            <div class="card">
                <div class="card-header">特征标签云</div>
                <canvas id="tagCloudCanvas" width="400" height="200"></canvas>
            </div>
        </div>
    </div>

    <!-- ========== 碰撞形态 ========== -->
    <div class="tab-content" id="tab-collision">
        <div class="query-bar">
            <div class="form-group"><label>时间范围</label><input type="date" value="2026-04-01"> - <input type="date" value="2026-05-08"></div>
            <div class="form-group"><label>行政区</label><select><option>全部</option><option>樊城区</option></select></div>
            <div class="form-group"><label>企业</label><select><option>全部</option><option>襄阳智行科技</option></select></div>
            <div class="form-group"><label>事故类型</label><select multiple><option selected>全部</option><option>碰撞</option><option>追尾</option></select></div>
            <button class="btn btn-primary">应用筛选</button>
        </div>
        <!-- 第一行：碰撞形态分布 + 玫瑰图 -->
        <div class="row-2">
            <div class="card"><div class="card-header">碰撞形态分布 (GA/T 16)</div><div class="chart-container" id="chartCollisionPie"></div></div>
            <div class="card"><div class="card-header">碰撞角度玫瑰图</div><div class="chart-container" id="chartAngleRose"></div></div>
        </div>
        <!-- 第二行：交叉表（全宽） -->
        <div class="row-1">
            <div class="card"><div class="card-header">伤亡等级 × 碰撞形态交叉表</div><table id="collisionCrossTable"></table></div>
        </div>
        <!-- 第三行：速度分布（全宽） -->
        <div class="row-1">
            <div class="card"><div class="card-header">碰撞速度区间分布</div><div class="chart-container" id="chartSpeedBox" style="height:300px;"></div></div>
        </div>
        <!-- 第四行：空间分布地图（全宽） -->
        <div class="row-1">
            <div class="card"><div class="card-header">空间分布（不同形态）</div><div id="collisionMapContainer" style="height:420px;"></div></div>
        </div>
    </div>
</div>

<!-- 模态框 -->
<div class="modal-mask" id="modalMask">
    <div class="modal">
        <div class="modal-header"><span id="modalTitle">关联信息</span><button class="btn btn-sm btn-outline" onclick="closeModal()">关闭</button></div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
(function() {
    function showToast(msg) {
        const t = document.createElement('div');
        t.style.cssText = 'position:fixed;top:20px;right:20px;z-index:999;background:#fff;padding:12px 20px;border-radius:6px;box-shadow:0 6px 16px rgba(0,0,0,0.1);font-size:13px;border-left:3px solid #1890ff;';
        t.textContent = '✅ ' + msg;
        document.body.appendChild(t);
        setTimeout(() => { t.style.opacity='0'; t.style.transition='0.3s'; setTimeout(() => t.remove(),300); },2500);
    }
    function openModal(title, contentHtml) {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalBody').innerHTML = contentHtml;
        document.getElementById('modalMask').classList.add('show');
    }
    window.closeModal = function() { document.getElementById('modalMask').classList.remove('show'); };

    const tabs = document.querySelectorAll('.tab-btn');
    const contents = document.querySelectorAll('.tab-content');
    tabs.forEach(b => b.addEventListener('click', function() {
        const target = this.dataset.tab;
        tabs.forEach(bb => bb.classList.remove('active'));
        this.classList.add('active');
        contents.forEach(c => c.classList.remove('active'));
        document.getElementById(target).classList.add('active');
        setTimeout(resizeAllCharts, 100);
        if (target === 'tab-st') { map && map.invalidateSize(); }
        if (target === 'tab-collision') { collisionMap && collisionMap.invalidateSize(); }
    }));

    const chartInstances = {};
    function initChart(id) {
        const dom = document.getElementById(id);
        if (!dom) return null;
        if (chartInstances[id]) chartInstances[id].dispose();
        const chart = echarts.init(dom);
        chartInstances[id] = chart;
        return chart;
    }
    function resizeAllCharts() {
        Object.values(chartInstances).forEach(c => { if (c && !c.isDisposed()) c.resize(); });
        if (map) map.invalidateSize();
        if (collisionMap) collisionMap.invalidateSize();
    }
    window.addEventListener('resize', () => { clearTimeout(window._rt); window._rt = setTimeout(resizeAllCharts, 200); });

    let map, heatLayer;
    function initMap() {
        const container = document.getElementById('mapContainer');
        if (!container) return;
        if (map) { map.remove(); map = null; }
        map = L.map(container).setView([32.0, 112.1], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        const points = [];
        const areas = [
            { lat:32.04, lng:112.14, r:0.03, cnt:300 },
            { lat:31.98, lng:112.10, r:0.025, cnt:250 },
            { lat:32.08, lng:112.20, r:0.02, cnt:180 },
            { lat:31.78, lng:111.85, r:0.018, cnt:150 },
            { lat:32.10, lng:111.65, r:0.016, cnt:130 },
        ];
        areas.forEach(a => {
            for (let i=0; i<a.cnt; i++) {
                const angle = Math.random()*Math.PI*2;
                const dist = Math.random()*a.r;
                points.push([a.lat+Math.cos(angle)*dist, a.lng+Math.sin(angle)*dist, Math.random()*0.8+0.2]);
            }
        });
        heatLayer = L.heatLayer(points, { radius: 20, blur: 15, maxZoom: 17 }).addTo(map);
    }

    let collisionMap;
    function initCollisionMap() {
        const container = document.getElementById('collisionMapContainer');
        if (!container) return;
        if (collisionMap) { collisionMap.remove(); collisionMap = null; }
        collisionMap = L.map(container).setView([32.0, 112.1], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(collisionMap);
        const typeColors = {
            '追尾': '#f5222d',
            '侧面': '#fa8c16',
            '正面': '#1890ff',
            '刮擦': '#52c41a',
            '行人': '#722ed1'
        };
        const types = Object.keys(typeColors);
        for (let i=0; i<250; i++) {
            const lat = 31.75 + Math.random() * 0.4;
            const lng = 111.70 + Math.random() * 0.65;
            const type = types[Math.floor(Math.random() * types.length)];
            L.circleMarker([lat, lng], {
                radius: 5 + Math.random() * 3,
                fillColor: typeColors[type],
                color: '#fff',
                weight: 1,
                fillOpacity: 0.8
            }).addTo(collisionMap).bindPopup(`${type}碰撞`);
        }
    }

    function renderHour() {
        const chart = initChart('chartHour');
        const data = [15,8,5,3,6,12,28,45,52,38,35,42,40,44,48,55,62,58,49,42,35,28,22,18];
        chart.setOption({ tooltip:{}, xAxis:{data:Array.from({length:24},(_,i)=>i+'时')}, yAxis:{name:'事故数'}, series:[{type:'bar',data:data,itemStyle:{color:'#1890ff'}}] });
    }
    function renderWeekday() {
        const chart = initChart('chartWeekday');
        chart.setOption({ tooltip:{}, xAxis:{data:['周一','周二','周三','周四','周五','周六','周日']}, yAxis:{name:'事故数'}, series:[{type:'bar',data:[210,205,198,215,230,180,165],itemStyle:{color:'#52c41a'}}] });
    }
    function renderMonth() {
        const chart = initChart('chartMonth');
        const m = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
        chart.setOption({ tooltip:{}, legend:{data:['2024','2025','2026'],bottom:0}, xAxis:{data:m}, yAxis:{name:'事故数'}, series:[ {name:'2024',type:'line',data:[120,100,130,140,150,160,170,165,155,145,135,125]}, {name:'2025',type:'line',data:[130,110,140,155,165,175,185,180,168,158,148,138]}, {name:'2026',type:'line',data:[140,120,150,165,180,190,200,195,182,172,162,152]}, ] });
    }
    function renderRegion() {
        const chart = initChart('chartRegion');
        chart.setOption({ tooltip:{}, xAxis:{data:['樊城区','襄城区','襄州区','南漳县','谷城县']}, yAxis:{name:'事故数'}, series:[{type:'bar',data:[386,298,215,178,170],itemStyle:{color:'#fa8c16'}}] });
    }
    function renderRoadLevel() {
        const chart = initChart('chartRoadLevel');
        chart.setOption({ tooltip:{}, series:[{type:'pie',radius:['45%','70%'],data:[{value:520,name:'主干道'},{value:340,name:'次干道'},{value:210,name:'支路'},{value:177,name:'快速路'}]}] });
    }

    const mockAccidents = [
        {id:'ACC-0508-001',time:'2026-05-08 14:32',loc:'长虹路建华路口',type:'追尾',plate:'鄂F·A1234',company:'襄阳智行',driver:'张三'},
        {id:'ACC-0507-015',time:'2026-05-07 08:15',loc:'檀溪路铁佛寺路口',type:'碰撞',plate:'鄂F·C3456',company:'汉江出行',driver:'李四'},
        {id:'ACC-0506-022',time:'2026-05-06 19:48',loc:'航空路金富士路口',type:'行人冲突',plate:'鄂F·E9012',company:'襄阳智行',driver:'王五'},
        {id:'ACC-0505-008',time:'2026-05-05 11:22',loc:'人民路天元四季城',type:'刮擦',plate:'鄂F·F4567',company:'顺捷科技',driver:'赵六'},
    ];
    function renderSearchTable() {
        const tbody = document.getElementById('searchTableBody');
        tbody.innerHTML = mockAccidents.map(a => `<tr><td>${a.id}</td><td>${a.time}</td><td>${a.loc}</td><td><span class="tag tag-red">${a.type}</span></td><td>${a.plate}</td><td>${a.company}</td><td>${a.driver}</td><td><button class="btn-link btn-sm" onclick="showRelated('同车辆','${a.plate}')">同车辆</button><button class="btn-link btn-sm" onclick="showRelated('同路段','${a.loc}')">同路段</button><button class="btn-link btn-sm" onclick="showRelated('同企业','${a.company}')">同企业</button><button class="btn-link btn-sm" onclick="showEvents('${a.id}')">关联事件</button></td></tr>`).join('');
    }
    window.showRelated = function(type, key) {
        const fake = mockAccidents.filter(()=>Math.random()>0.4).concat(mockAccidents[0]);
        const html = `<p>基于 <b>${key}</b> 的关联事故：</p><table><tr><th>事故编号</th><th>时间</th><th>地点</th><th>类型</th></tr>${fake.map(a=>`<tr><td>${a.id}</td><td>${a.time}</td><td>${a.loc}</td><td>${a.type}</td></tr>`).join('')}</table>`;
        openModal(`${type} - 关联事故`, html);
    };
    window.showEvents = function(accId) {
        const events = [{type:'告警',time:'14:30:12',desc:'行人闯入预警'},{type:'故障',time:'14:31:05',desc:'制动系统温度过高'},{type:'驾驶行为',time:'14:31:20',desc:'急减速 -2.1m/s²'}];
        const html = `<p>事故 ${accId} 前后30分钟关联事件：</p><table><tr><th>类型</th><th>时间</th><th>描述</th></tr>${events.map(e=>`<tr><td><span class="tag tag-orange">${e.type}</span></td><td>${e.time}</td><td>${e.desc}</td></tr>`).join('')}</table>`;
        openModal(`关联事件 - ${accId}`, html);
    };

    function renderCrossMatrix() {
        const chart = initChart('chartCrossMatrix');
        const x = ['追尾','碰撞','刮擦','行人冲突'];
        const y = ['高峰','平峰','夜间'];
        const data = [[0,0,38],[0,1,28],[0,2,12],[1,0,20],[1,1,35],[1,2,8],[2,0,15],[2,1,22],[2,2,5],[3,0,10],[3,1,18],[3,2,6]];
        chart.setOption({ tooltip:{}, grid:{left:80,right:30,bottom:30}, xAxis:{type:'category',data:x}, yAxis:{type:'category',data:y}, visualMap:{min:0,max:40,orient:'horizontal',left:'center',bottom:0,inRange:{color:['#e6f7ff','#1890ff','#003a8c']}}, series:[{type:'heatmap',data:data,label:{show:true}}] });
    }
    function renderSingleDim(type='事故类型') {
        const chart = initChart('chartSingleDim');
        const dataMap = {
            '事故类型':[{name:'追尾',value:180},{name:'碰撞',value:95},{name:'刮擦',value:72},{name:'行人冲突',value:50}],
            '车辆类型':[{name:'轿车',value:210},{name:'SUV',value:120},{name:'货车',value:45}],
            '测试场景':[{name:'封闭道路',value:150},{name:'开放道路',value:200}],
            '道路类型':[{name:'主干道',value:180},{name:'次干道',value:120},{name:'支路',value:70}],
        };
        chart.setOption({tooltip:{},series:[{type:'pie',radius:'65%',data:dataMap[type]||dataMap['事故类型']}]});
    }
    function renderTagCloud() {
        const canvas = document.getElementById('tagCloudCanvas');
        if (!canvas) return;
        const words = [['追尾',38],['自动驾驶',32],['城区道路',28],['高峰时段',25],['轻伤',20],['未按规定让行',18],['碰撞',30],['手动驾驶',16],['夜间',14],['行人冲突',22],['刮擦',12],['制动效能不足',10]];
        WordCloud(canvas, { list: words.map(w => [w[0], w[1]]), gridSize:10, weightFactor:3, fontFamily:'sans-serif', color:'random-dark', rotateRatio:0.3, backgroundColor:'#fff', shape:'square' });
    }

    function renderCollisionPie() {
        const chart = initChart('chartCollisionPie');
        chart.setOption({ tooltip:{}, series:[{type:'pie',radius:['35%','65%'],data:[{value:85,name:'追尾碰撞'},{value:62,name:'侧面碰撞'},{value:48,name:'正面碰撞'},{value:35,name:'刮擦'},{value:17,name:'行人冲突'}]}] });
    }
    function renderAngleRose() {
        const chart = initChart('chartAngleRose');
        chart.setOption({ angleAxis:{type:'category',data:['0°','30°','60°','90°','120°','150°','180°','210°','240°','270°','300°','330°']}, radiusAxis:{}, polar:{}, series:[{type:'bar',data:[5,8,14,22,30,18,12,8,7,5,4,3],coordinateSystem:'polar',color:'#ff7875'}] });
    }
    function renderCollisionCrossTable() {
        const tbody = document.getElementById('collisionCrossTable');
        const rows = [['死亡','2','1','3','0','2'],['重伤','5','4','6','1','3'],['轻伤','12','15','22','8','10'],['无伤亡','30','25','40','35','5']];
        tbody.innerHTML = `<thead><tr><th>伤亡等级</th><th>正面碰撞</th><th>侧面碰撞</th><th>追尾碰撞</th><th>刮擦</th><th>行人冲突</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r[0]}</td>${r.slice(1).map(v=>`<td style="background:rgba(245,34,45,${v/40*0.3})">${v}</td>`).join('')}</tr>`).join('')}</tbody>`;
    }
    function renderSpeedBox() {
        const chart = initChart('chartSpeedBox');
        chart.setOption({ tooltip:{}, xAxis:{data:['追尾','侧面','正面','刮擦','行人']}, yAxis:{name:'km/h'}, series:[{type:'boxplot',data:[[15,22,28,35,42],[12,18,25,30,38],[20,28,35,42,50],[8,12,18,22,28],[5,8,12,15,20]],itemStyle:{color:'#1890ff'}}] });
    }

    function initAll() {
        renderHour(); renderWeekday(); renderMonth(); renderRegion(); renderRoadLevel();
        renderSearchTable();
        renderCrossMatrix(); renderSingleDim(); renderTagCloud();
        renderCollisionPie(); renderAngleRose(); renderCollisionCrossTable(); renderSpeedBox();
        initMap();
        initCollisionMap();
    }
    document.addEventListener('DOMContentLoaded', initAll);

    document.getElementById('singleDimSelect')?.addEventListener('change', function(){ renderSingleDim(this.value); });
    document.getElementById('profileX')?.addEventListener('change', ()=>{ renderCrossMatrix(); });
    document.getElementById('profileY')?.addEventListener('change', ()=>{ renderCrossMatrix(); });
})();
</script>
</body>
</html>
