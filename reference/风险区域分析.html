<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事故分析研判 - 风险区域分析</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
    <style>
        :root {
            --primary: #1890ff;
            --primary-hover: #40a9ff;
            --primary-bg: #e6f7ff;
            --success: #52c41a;
            --warning: #faad14;
            --error: #f5222d;
            --text-primary: #262626;
            --text-secondary: #595959;
            --text-tertiary: #8c8c8c;
            --border: #d9d9d9;
            --border-light: #f0f0f0;
            --bg: #f0f2f5;
            --bg-white: #fff;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03);
            --radius: 6px;
            --radius-lg: 8px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:var(--font); background:var(--bg); color:var(--text-primary); line-height:1.5715; min-height:100vh; -webkit-font-smoothing:antialiased; }
        .app-layout { display:flex; height:100vh; }
        .sidebar { width:240px; background:#001529; color:#fff; flex-shrink:0; display:flex; flex-direction:column; box-shadow:2px 0 8px rgba(0,0,0,0.15); }
        .sidebar-logo { padding:18px 20px; font-size:16px; font-weight:600; display:flex; align-items:center; gap:10px; border-bottom:1px solid rgba(255,255,255,0.1); letter-spacing:0.5px; }
        .sidebar-logo .icon { width:32px; height:32px; border-radius:var(--radius); background:var(--error); display:flex; align-items:center; justify-content:center; font-size:16px; }
        .sidebar-menu { flex:1; padding:8px 0; overflow-y:auto; }
        .menu-group-title { padding:14px 20px 4px; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:rgba(255,255,255,0.4); font-weight:600; }
        .menu-item { display:flex; align-items:center; gap:10px; padding:11px 20px; font-size:13px; color:rgba(255,255,255,0.75); cursor:pointer; transition:all 0.2s; border-left:3px solid transparent; user-select:none; }
        .menu-item:hover { background:rgba(255,255,255,0.05); color:#fff; }
        .menu-item.active { background:rgba(24,144,255,0.2); color:#fff; border-left-color:var(--primary); font-weight:500; }
        .main-content { flex:1; overflow-y:auto; padding:20px 24px 30px; background:var(--bg); }
        .page-header { margin-bottom:16px; }
        .page-title { font-size:20px; font-weight:600; color:var(--text-primary); margin-bottom:4px; }
        .page-subtitle { font-size:13px; color:var(--text-tertiary); }
        .stat-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:16px; }
        .stat-card { background:var(--bg-white); border-radius:var(--radius-lg); padding:18px 20px; box-shadow:var(--shadow-sm); border:1px solid var(--border-light); display:flex; flex-direction:column; gap:6px; transition:0.2s; }
        .stat-card:hover { box-shadow:0 1px 2px -2px rgba(0,0,0,0.16),0 3px 6px 0 rgba(0,0,0,0.12); transform:translateY(-1px); }
        .stat-card .stat-label { font-size:12px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.5px; font-weight:500; }
        .stat-card .stat-value { font-size:26px; font-weight:700; letter-spacing:-0.5px; }
        .stat-card .stat-sub { font-size:11px; color:var(--text-tertiary); }
        .stat-card.accent-red { border-left:3px solid var(--error); }
        .stat-card.accent-orange { border-left:3px solid var(--warning); }
        .stat-card.accent-green { border-left:3px solid var(--success); }
        .stat-card.accent-blue { border-left:3px solid var(--primary); }
        .query-bar { background:var(--bg-white); border-radius:var(--radius-lg); padding:14px 20px; margin-bottom:16px; display:flex; flex-wrap:wrap; align-items:flex-end; gap:12px; box-shadow:var(--shadow-sm); border:1px solid var(--border-light); }
        .form-group { display:flex; flex-direction:column; gap:4px; min-width:110px; }
        .form-group label { font-size:11px; font-weight:500; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.4px; }
        select, input { height:32px; padding:0 10px; border:1px solid var(--border); border-radius:var(--radius); font-size:13px; font-family:var(--font); background:#fff; outline:none; min-width:100px; transition:all 0.2s; }
        select:focus, input:focus { border-color:var(--primary); box-shadow:0 0 0 2px rgba(24,144,255,0.2); }
        .btn { height:32px; padding:0 14px; border:none; border-radius:var(--radius); cursor:pointer; font-size:13px; font-weight:500; font-family:var(--font); transition:all 0.2s; display:inline-flex; align-items:center; gap:5px; white-space:nowrap; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-primary:hover { background:var(--primary-hover); }
        .btn-default { background:#fff; color:var(--text-primary); border:1px solid var(--border); }
        .btn-default:hover { color:var(--primary); border-color:var(--primary); }
        .btn-sm { height:26px; padding:0 10px; font-size:12px; }
        .btn-link { background:transparent; color:var(--primary); border:none; padding:0 3px; height:auto; cursor:pointer; font-weight:400; font-size:12px; }
        .btn-link:hover { color:var(--primary-hover); text-decoration:underline; }
        .card { background:var(--bg-white); border-radius:var(--radius-lg); padding:20px; box-shadow:var(--shadow-sm); border:1px solid var(--border-light); margin-bottom:16px; }
        .card-header { font-size:14px; font-weight:600; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; }
        .map-container { height:420px; border-radius:6px; overflow:hidden; }
        .table-wrap { overflow-x:auto; margin-top:6px; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th { background:#fafafa; padding:10px 14px; text-align:left; font-weight:600; color:var(--text-secondary); border-bottom:1px solid var(--border-light); white-space:nowrap; font-size:11px; text-transform:uppercase; cursor:pointer; }
        th:hover { background:#f0f0f0; }
        td { padding:10px 14px; border-bottom:1px solid #f5f5f5; }
        tbody tr:hover { background:#fafafa; cursor:pointer; }
        .tag { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:500; white-space:nowrap; }
        .tag-red { background:#fff1f0; color:#cf1322; }
        .tag-orange { background:#fff7e6; color:#d46b08; }
        .tag-green { background:#f6ffed; color:#389e0d; }
        .tag-blue { background:#e6f7ff; color:#096dd9; }
        .pagination-bar { display:flex; align-items:center; justify-content:flex-end; gap:8px; margin-top:14px; font-size:12px; color:var(--text-secondary); }
        .pagination-bar select { width:70px; height:28px; }
        .pagination-bar .btn-sm { height:28px; }
        .modal-mask { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.45); z-index:1000; align-items:center; justify-content:center; }
        .modal-mask.show { display:flex; }
        .modal { background:#fff; border-radius:8px; width:780px; max-height:80vh; display:flex; flex-direction:column; box-shadow:0 6px 16px rgba(0,0,0,0.1); }
        .modal-header { padding:14px 20px; border-bottom:1px solid var(--border-light); display:flex; justify-content:space-between; align-items:center; font-weight:600; }
        .modal-body { padding:16px 20px; overflow-y:auto; flex:1; font-size:13px; line-height:1.8; }
        @media (max-width:1200px) { .stat-cards { grid-template-columns:repeat(2,1fr); } .sidebar { width:200px; } }
        @media (max-width:768px) { .app-layout { flex-direction:column; } .sidebar { width:100%; height:auto; flex-direction:row; overflow-x:auto; } .sidebar-menu { display:flex; padding:0; } .menu-item { padding:10px 14px; border-left:none; border-bottom:2px solid transparent; } .menu-item.active { border-bottom-color:var(--primary); } .main-content { padding:12px; } .stat-cards { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- 左侧导航 -->
        <aside class="sidebar">
            <div class="sidebar-logo"><span class="icon">🛡️</span>事故分析研判</div>
            <nav class="sidebar-menu">
                <div class="menu-group-title">研判分析</div>
                <div class="menu-item" data-page="hotspot">📍 多发地点分析</div>
                <div class="menu-item active" data-page="risk">⚠️ 风险区域分析</div>
                <div class="menu-item" data-page="trend">📈 事故趋势分析</div>
                <div class="menu-item" data-page="vehicle">🚗 车辆主体分析</div>
                <div class="menu-group-title">决策输出</div>
                <div class="menu-item" data-page="report">📋 分析报告与建议</div>
            </nav>
        </aside>
        <!-- 右侧主内容 -->
        <main class="main-content">
            <div class="page-header">
                <div class="page-title">风险区域分析</div>
                <div class="page-subtitle">对典型区域进行结构化分类与综合风险分级，输出分级管控策略</div>
            </div>
            <!-- 统计卡片 -->
            <div class="stat-cards">
                <div class="stat-card accent-red"><span class="stat-label">高风险区域</span><span class="stat-value" id="highRiskCount" style="color:#f5222d;">4</span></div>
                <div class="stat-card accent-orange"><span class="stat-label">中风险区域</span><span class="stat-value" id="midRiskCount" style="color:#fa8c16;">4</span></div>
                <div class="stat-card accent-green"><span class="stat-label">低风险区域</span><span class="stat-value" id="lowRiskCount" style="color:#52c41a;">2</span></div>
                <div class="stat-card accent-blue"><span class="stat-label">潜在风险区域</span><span class="stat-value" id="potentialCount" style="color:#1890ff;">2</span></div>
            </div>
            <!-- 查询栏 -->
            <div class="query-bar">
                <div class="form-group"><label>时间范围</label><div style="display:flex;gap:4px;align-items:center;"><input type="date" value="2026-04-01" style="width:130px;"><span>-</span><input type="date" value="2026-05-08" style="width:130px;"></div></div>
                <div class="form-group"><label>行政区域</label><select><option>全部</option><option>樊城区</option><option>襄城区</option><option>襄州区</option><option>南漳县</option><option>谷城县</option></select></div>
                <div class="form-group"><label>风险等级</label><select><option>全部</option><option>高</option><option>中</option><option>低</option></select></div>
                <div class="form-group"><label>区域类型</label><select><option>全部</option><option>交叉口</option><option>接入点</option><option>复杂交通组织区</option><option>隧道</option><option>学校/医院周边</option></select></div>
                <button class="btn btn-primary" onclick="showToast('查询完成')">🔍 查询</button>
                <button class="btn btn-default" onclick="showToast('导出成功')">📥 导出Excel</button>
            </div>
            <!-- 全宽地图 -->
            <div class="card">
                <div class="card-header">风险区域GIS地图 <span style="font-weight:400;font-size:12px;color:var(--text-tertiary);">面要素按风险等级填色</span></div>
                <div id="riskMap" class="map-container"></div>
            </div>
            <!-- 风险区域清单 -->
            <div class="card">
                <div class="card-header">风险区域清单 <span style="font-weight:400;font-size:12px;color:var(--text-tertiary);">共 10 条 | 点击行查看详情</span></div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>区域编号</th><th>区域名称</th><th>区域类型</th><th>所属区县</th><th>风险等级</th><th>风险类别</th><th>事故数量</th><th>主要致因</th><th>环境特征</th><th>操作</th></tr></thead>
                        <tbody id="riskTableBody"></tbody>
                    </table>
                </div>
                <div class="pagination-bar">
                    <span>共 <b>10</b> 条</span>
                    <select><option value="10">10</option><option value="20">20</option></select>
                    <span>条/页</span>
                    <button class="btn btn-sm btn-default" disabled>上一页</button>
                    <span>第 <b>1</b> / <b>1</b> 页</span>
                    <button class="btn btn-sm btn-default" disabled>下一页</button>
                </div>
            </div>
        </main>
    </div>

    <!-- 区域内事故清单弹窗 -->
    <div class="modal-mask" id="accidentModal">
        <div class="modal">
            <div class="modal-header">
                <span id="modalTitle">区域事故清单</span>
                <button class="btn btn-sm btn-default" onclick="closeAccidentModal()">✕ 关闭</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 模拟数据 ====================
            const riskZones = [
                { id:'RZ-001', name:'长虹路建华路口', type:'交叉口', district:'樊城区', risk:'高', category:'已发', accidents:28, cause:'视距不足', env:'绿化带遮挡', lat:32.045, lng:112.140 },
                { id:'RZ-002', name:'檀溪路铁佛寺路口', type:'交叉口', district:'襄城区', risk:'高', category:'已发', accidents:22, cause:'信号违规', env:'车流量大', lat:32.010, lng:112.105 },
                { id:'RZ-003', name:'航空路金富士路口', type:'接入点', district:'襄州区', risk:'中', category:'已发', accidents:15, cause:'行人横穿', env:'商业区周边', lat:32.080, lng:112.200 },
                { id:'RZ-004', name:'卧龙大道立交', type:'复杂交通组织区', district:'樊城区', risk:'中', category:'已发', accidents:12, cause:'车道偏离', env:'立交匝道', lat:32.060, lng:112.090 },
                { id:'RZ-005', name:'环城南路隧道', type:'隧道', district:'襄城区', risk:'中', category:'已发', accidents:8, cause:'制动响应延迟', env:'光线变化', lat:31.995, lng:112.098 },
                { id:'RZ-006', name:'人民路学校周边', type:'学校/医院周边', district:'樊城区', risk:'高', category:'已发', accidents:18, cause:'未按规定让行', env:'人流密集', lat:32.035, lng:112.125 },
                { id:'RZ-007', name:'建设路银城大道口', type:'交叉口', district:'谷城县', risk:'低', category:'已发', accidents:5, cause:'超速行驶', env:'郊区路段', lat:32.100, lng:111.650 },
                { id:'RZ-008', name:'大庆路人民路口', type:'交叉口', district:'樊城区', risk:'中', category:'潜在', accidents:0, cause:'环境复杂度高', env:'多车道交汇', lat:32.025, lng:112.115 },
                { id:'RZ-009', name:'前进路长征路口', type:'接入点', district:'襄州区', risk:'低', category:'潜在', accidents:0, cause:'交通流特征', env:'单位出入口', lat:32.050, lng:112.155 },
                { id:'RZ-010', name:'解放路明珠路口', type:'交叉口', district:'南漳县', risk:'高', category:'已发', accidents:20, cause:'疲劳驾驶', env:'城乡结合部', lat:31.780, lng:111.860 },
            ];

            // 区域内事故清单（模拟）
            const accidentData = {};
            riskZones.forEach(z => {
                const count = z.accidents > 0 ? z.accidents : Math.floor(Math.random()*8)+1;
                const list = [];
                for(let i=0; i<Math.min(count, 8); i++){
                    list.push({
                        id: `ACC-${z.id}-${i+1}`,
                        time: `2026-0${4+Math.floor(Math.random()*2)}-${String(Math.floor(Math.random()*28)+1).padStart(2,'0')} ${String(Math.floor(Math.random()*24)).padStart(2,'0')}:${String(Math.floor(Math.random()*60)).padStart(2,'0')}`,
                        type: ['追尾','碰撞','刮擦','行人冲突'][Math.floor(Math.random()*4)],
                        severity: ['死亡','重伤','轻伤','无伤亡'][Math.floor(Math.random()*4)],
                        plate: '鄂F·' + ['A','B','C','D','E'][Math.floor(Math.random()*5)] + String(Math.floor(Math.random()*9000)+1000),
                        company: ['襄阳智行科技','汉江出行','顺捷科技','东风出行'][Math.floor(Math.random()*4)],
                    });
                }
                accidentData[z.id] = list;
            });

            // 统计卡片更新
            document.getElementById('highRiskCount').textContent = riskZones.filter(z=>z.risk==='高').length;
            document.getElementById('midRiskCount').textContent = riskZones.filter(z=>z.risk==='中').length;
            document.getElementById('lowRiskCount').textContent = riskZones.filter(z=>z.risk==='低').length;
            document.getElementById('potentialCount').textContent = riskZones.filter(z=>z.category==='潜在').length;

            // 渲染表格
            function renderTable() {
                const tbody = document.getElementById('riskTableBody');
                tbody.innerHTML = riskZones.map(z => {
                    const riskTag = z.risk==='高'?'tag-red':z.risk==='中'?'tag-orange':'tag-green';
                    const catTag = z.category==='已发'?'tag-red':'tag-blue';
                    const catLabel = z.category==='已发'?'已发风险':'潜在风险';
                    return `<tr onclick="showAccidentList('${z.id}')">
                        <td>${z.id}</td>
                        <td><strong>${z.name}</strong></td>
                        <td>${z.type}</td>
                        <td>${z.district}</td>
                        <td><span class="tag ${riskTag}">${z.risk}</span></td>
                        <td><span class="tag ${catTag}">${catLabel}</span></td>
                        <td>${z.accidents}</td>
                        <td>${z.cause}</td>
                        <td>${z.env}</td>
                        <td><button class="btn-link" onclick="event.stopPropagation();showAccidentList('${z.id}')">查看详情</button></td>
                    </tr>`;
                }).join('');
            }
            renderTable();

            // 初始化地图
            let map;
            function initMap() {
                const container = document.getElementById('riskMap');
                if(!container) return;
                if(map) map.remove();
                map = L.map(container).setView([32.0, 112.12], 11);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap' }).addTo(map);
                riskZones.forEach(z => {
                    const color = z.risk==='高'?'#f5222d':z.risk==='中'?'#fa8c16':'#52c41a';
                    const radius = 1500 + z.accidents*30;
                    L.circle([z.lat, z.lng], { radius:radius, fillColor:color, color:color, weight:1.5, fillOpacity:0.25 }).addTo(map)
                     .bindPopup(`<b>${z.name}</b><br>类型：${z.type}<br>风险等级：${z.risk}<br>事故数：${z.accidents}起`);
                    L.marker([z.lat, z.lng], {
                        icon: L.divIcon({ className:'', html:`<div style="font-size:9px;font-weight:600;color:#262626;text-shadow:0 0 4px #fff;white-space:nowrap;">${z.name}</div>`, iconSize:[120,20], iconAnchor:[60,10] })
                    }).addTo(map);
                });
            }

            // 弹窗：区域内事故清单
            window.showAccidentList = function(zoneId) {
                const zone = riskZones.find(z=>z.id===zoneId);
                if(!zone) return;
                const list = accidentData[zoneId] || [];
                const severityColor = { '死亡':'tag-red','重伤':'tag-orange','轻伤':'tag-yellow','无伤亡':'tag-green' };
                const html = `
                    <p><b>区域：</b>${zone.name} | <b>风险等级：</b>${zone.risk} | <b>事故总数：</b>${zone.accidents}起</p>
                    <div class="table-wrap"><table>
                        <thead><tr><th>事故编号</th><th>时间</th><th>类型</th><th>严重程度</th><th>车牌号</th><th>所属企业</th></tr></thead>
                        <tbody>${list.map(a=>`<tr>
                            <td>${a.id}</td><td>${a.time}</td><td>${a.type}</td>
                            <td><span class="tag ${severityColor[a.severity]||'tag-blue'}">${a.severity}</span></td>
                            <td>${a.plate}</td><td>${a.company}</td>
                        </tr>`).join('')}</tbody>
                    </table></div>
                `;
                document.getElementById('modalTitle').textContent = `区域事故清单 - ${zone.name}`;
                document.getElementById('modalBody').innerHTML = html;
                document.getElementById('accidentModal').classList.add('show');
            };
            window.closeAccidentModal = function() { document.getElementById('accidentModal').classList.remove('show'); };
            document.getElementById('accidentModal').addEventListener('click', function(e){ if(e.target===this) closeAccidentModal(); });

            window.showToast = function(msg) {
                const t = document.createElement('div');
                t.style.cssText = 'position:fixed;top:20px;right:20px;z-index:999;background:#fff;padding:12px 20px;border-radius:6px;box-shadow:0 6px 16px rgba(0,0,0,0.1);font-size:13px;border-left:3px solid #1890ff;';
                t.textContent = '✅ '+msg;
                document.body.appendChild(t);
                setTimeout(()=>{ t.style.opacity='0'; t.style.transition='0.3s'; setTimeout(()=>t.remove(),300); },2000);
            };

            // 侧边栏点击（其他菜单仅提示）
            document.querySelectorAll('.menu-item').forEach(item => {
                item.addEventListener('click', function() {
                    document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
                    this.classList.add('active');
                    if(this.dataset.page !== 'risk') showToast('该功能正在建设中，当前仅演示风险区域分析');
                });
            });

            initMap();
            window.addEventListener('resize', ()=>{ if(map) map.invalidateSize(); });
        })();
    </script>
</body>
</html>
