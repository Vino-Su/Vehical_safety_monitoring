<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智能网联汽车安全监测平台 - 测试数据总览</title>
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 24px;
            color: #1f2f3d;
        }

        .dashboard-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 卡片样式 */
        .ant-card {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.03), 0 1px 6px -1px rgba(0, 0, 0, 0.02);
            padding: 20px 24px;
            margin-bottom: 24px;
        }

        .ant-card-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 4px solid #1890ff;
            padding-left: 12px;
        }

        .period-badge {
            font-size: 12px;
            font-weight: normal;
            color: #8c8c8c;
            margin-left: 12px;
        }

        /* 统计卡片网格 */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .stat-item {
            background: #fafafa;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            border: 1px solid #f0f0f0;
            transition: all 0.2s;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 600;
            color: #1890ff;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 14px;
            color: #8c8c8c;
            margin-top: 8px;
        }

        /* 表格 */
        .ant-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .ant-table th,
        .ant-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        .ant-table th {
            background: #fafafa;
            font-weight: 500;
        }

        .ant-badge-green {
            background: #e6f7e6;
            color: #52c41a;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .ant-badge-orange {
            background: #fff7e6;
            color: #fa8c16;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .chart-container {
            width: 100%;
            height: 320px;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ant-select {
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            padding: 5px 11px;
            background: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .ant-btn {
            border-radius: 4px;
            padding: 4px 15px;
            border: 1px solid #d9d9d9;
            background: #fff;
            cursor: pointer;
        }

        .ant-btn-primary {
            background: #1890ff;
            border-color: #1890ff;
            color: #fff;
        }

        .vehicle-dynamic-list {
            max-height: 380px;
            overflow-y: auto;
        }

        .list-item {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .vehicle-plate {
            font-weight: 600;
            color: #1890ff;
        }

        /* 布局辅助 */
        .row-two-cols {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .col-half {
            flex: 1;
            min-width: 280px;
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <!-- 页面标题 -->
    <div style="margin-bottom: 20px;">
        <h1 style="font-size: 24px; font-weight: 600;"><i class="fas fa-chart-line" style="margin-right: 12px; color: #1890ff;"></i>测试数据总览</h1>
        <p style="color: #8c8c8c;">智能网联汽车道路测试与示范应用全局数据看板</p>
    </div>

    <!-- ========= 上方区域：累计数据模块，共用时间范围选择器 ========= -->
    <div class="ant-card" style="padding-bottom: 12px;">
        <div class="flex-between" style="margin-bottom: 16px;">
            <div class="ant-card-title" style="margin-bottom:0; border-left: none; padding-left:0;">统计分析周期 <span class="period-badge">以下图表共用时间筛选</span></div>
            <div>
                <select id="timeRangeSelect" class="ant-select">
                    <option value="week">近7天</option>
                    <option value="month" selected>近1个月</option>
                    <option value="quarter">近3个月</option>
                    <option value="year">近1年</option>
                </select>
                <button id="refreshUpperBtn" class="ant-btn ant-btn-primary" style="margin-left: 12px;"><i class="fas fa-sync-alt"></i> 刷新</button>
            </div>
        </div>
        <!-- 累计数据卡片（汇总值） -->
        <div class="stat-grid" id="cumulativeStats" style="margin-bottom: 24px;"></div>
        <!-- 两列：累计测试里程柱状图 + 里程趋势折线图 -->
        <div class="row-two-cols">
            <div class="col-half">
                <div class="ant-card-title" style="margin-top:0;">测试主体累计测试里程 <span class="period-badge">所选周期内各企业累计里程</span></div>
                <div id="mileageBarChart" class="chart-container" style="height: 300px;"></div>
            </div>
            <div class="col-half">
                <div class="ant-card-title" style="margin-top:0;">测试里程趋势分析 <span class="period-badge">所选周期内自动驾驶vs人工里程</span></div>
                <div id="trendChart" class="chart-container" style="height: 300px;"></div>
            </div>
        </div>
    </div>

    <!-- ========= 下方区域：实时数据模块，无时间选择 ========= -->
    <div style="margin-top: 8px;">
        <!-- 当日测试情况（固定今日） -->
        <div class="ant-card">
            <div class="ant-card-title">当日测试情况 <span class="period-badge">今日实时数据</span></div>
            <div class="stat-grid" id="dailyStats"></div>
        </div>

        <!-- 当前测试企业车辆统计 + 实时车辆动态 两列布局 -->
        <div class="row-two-cols">
            <div class="col-half">
                <div class="ant-card" style="height: 100%;">
                    <div class="ant-card-title">当前测试企业车辆统计 <span class="period-badge">实时快照</span></div>
                    <div style="overflow-x: auto;">
                        <table class="ant-table" id="enterpriseVehicleTable">
                            <thead><tr><th>企业名称</th><th>当日测试车辆数</th><th>正在测试车辆数</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                    <div style="margin-top: 12px; font-size:12px; color:#aaa;">* 正在测试车辆指自动驾驶/人工驾驶且车速>0的车辆</div>
                </div>
            </div>
            <div class="col-half">
                <div class="ant-card" style="height: 100%;">
                    <div class="ant-card-title">实时车辆动态 <span class="period-badge">最新上报数据（8秒轮换）</span></div>
                    <div class="vehicle-dynamic-list" id="vehicleDynamicList"></div>
                    <div style="margin-top: 12px; text-align: right; font-size:12px; color:#aaa;">共 <span id="totalDynamicCount">0</span> 条记录</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- 模拟基础数据 ----------
    // 累计数据（根据时间范围会改变数值，模拟不同周期）
    function getCumulativeByPeriod(period) {
        const base = { enterpriseCount: 24, licenseCount: 186, totalTestHours: 18920, totalRemindCount: 453 };
        if(period === 'week') return { enterpriseCount: 12, licenseCount: 32, totalTestHours: 2130, totalRemindCount: 67 };
        if(period === 'month') return { enterpriseCount: 20, licenseCount: 98, totalTestHours: 8750, totalRemindCount: 214 };
        if(period === 'quarter') return { enterpriseCount: 24, licenseCount: 156, totalTestHours: 15670, totalRemindCount: 389 };
        return base; // year
    }

    // 企业累计里程（周期不同，里程变化）
    const enterpriseNames = ["东风悦享", "达安检测", "百度智行", "襄阳公交", "酷哇机器人", "新石器", "文远知行", "智行未来"];
    function getEnterpriseMileageByPeriod(period) {
        const factor = period === 'week' ? 0.12 : period === 'month' ? 0.5 : period === 'quarter' ? 0.85 : 1;
        const baseMileage = [12560, 9870, 7450, 5680, 4230, 3120, 2980, 870];
        return baseMileage.map(m => Math.round(m * factor));
    }

    // 趋势数据（根据周期返回不同的时间轴和里程值）
    function getTrendData(period) {
        if(period === 'week') {
            return {
                dates: ['05-03', '05-04', '05-05', '05-06', '05-07', '05-08', '今日'],
                auto: [120, 145, 170, 190, 210, 245, 268],
                manual: [85, 72, 68, 60, 55, 48, 42]
            };
        } else if(period === 'month') {
            return {
                dates: ['第1周', '第2周', '第3周', '第4周'],
                auto: [980, 1150, 1320, 1480],
                manual: [560, 490, 430, 380]
            };
        } else if(period === 'quarter') {
            return {
                dates: ['1月', '2月', '3月'],
                auto: [3240, 3780, 4120],
                manual: [1860, 1620, 1450]
            };
        } else { // year
            return {
                dates: ['2024-05', '2024-07', '2024-09', '2024-11', '2025-01', '2025-03'],
                auto: [3420, 4780, 5810, 7020, 7680, 8950],
                manual: [2130, 1670, 1430, 1150, 1050, 870]
            };
        }
    }

    // 实时数据（当日测试情况，固定值，但可以通过刷新按钮微小变动模拟）
    let dailyData = {
        currentEnterprises: 12,
        currentVehicles: 48,
        todayMileage: 3245,
        todayDuration: 186,
        passengerMileage: 1250,
        passengerDuration: 78
    };
    // 企业车辆统计（实时数据可刷新波动）
    let enterpriseVehicleStats = [
        { name: "东风悦享科技有限公司", testVehicles: 12, activeVehicles: 8 },
        { name: "襄阳达安汽车检测中心", testVehicles: 9, activeVehicles: 6 },
        { name: "百度智行科技（襄阳）", testVehicles: 8, activeVehicles: 5 },
        { name: "襄阳市公共交通集团", testVehicles: 6, activeVehicles: 4 },
        { name: "酷哇机器人有限公司", testVehicles: 5, activeVehicles: 3 },
        { name: "新石器慧通（北京）", testVehicles: 4, activeVehicles: 2 },
        { name: "文远知行（襄阳）", testVehicles: 3, activeVehicles: 2 },
        { name: "襄阳智行未来科技", testVehicles: 1, activeVehicles: 1 }
    ];
    // 动态车辆列表
    let dynamicVehicles = [
        { plate: "鄂FD12345试", enterprise: "东风悦享科技有限公司", mode: "自动驾驶", time: "2025-05-09 14:32:18" },
        { plate: "鄂F0998试", enterprise: "达安检测", mode: "人工驾驶", time: "2025-05-09 14:31:55" },
        { plate: "鄂FD8876试", enterprise: "百度智行", mode: "自动驾驶", time: "2025-05-09 14:32:02" },
        { plate: "鄂F05678试", enterprise: "襄阳公交", mode: "自动驾驶", time: "2025-05-09 14:30:44" },
        { plate: "鄂FD2345试", enterprise: "酷哇机器人", mode: "远程驾驶", time: "2025-05-09 14:29:30" },
        { plate: "鄂F临时789", enterprise: "新石器", mode: "自动驾驶", time: "2025-05-09 14:28:12" },
        { plate: "鄂F临0012", enterprise: "文远知行", mode: "人工驾驶", time: "2025-05-09 14:27:50" },
        { plate: "鄂FD9977试", enterprise: "智行未来", mode: "自动驾驶", time: "2025-05-09 14:26:33" },
        { plate: "鄂FD5588试", enterprise: "东风悦享", mode: "自动驾驶", time: "2025-05-09 14:25:19" },
        { plate: "鄂F临0234", enterprise: "达安检测", mode: "人工驾驶", time: "2025-05-09 14:24:05" }
    ];

    // 图表实例
    let barChart, trendChart;

    // 渲染上方区域（基于周期）
    function renderUpperSection(period) {
        // 累计卡片
        const cum = getCumulativeByPeriod(period);
        document.getElementById('cumulativeStats').innerHTML = `
            <div class="stat-item"><div class="stat-value">${cum.enterpriseCount}</div><div class="stat-label">测试企业数</div></div>
            <div class="stat-item"><div class="stat-value">${cum.licenseCount}</div><div class="stat-label">临牌发放数</div></div>
            <div class="stat-item"><div class="stat-value">${cum.totalTestHours.toLocaleString()}</div><div class="stat-label">测试时长(小时)</div></div>
            <div class="stat-item"><div class="stat-value">${cum.totalRemindCount}</div><div class="stat-label">下发提醒(次)</div></div>
        `;
        // 柱状图：企业累计测试里程
        const mileages = getEnterpriseMileageByPeriod(period);
        if(barChart) barChart.dispose();
        barChart = echarts.init(document.getElementById('mileageBarChart'));
        barChart.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '10%', containLabel: true },
            xAxis: { type: 'value', name: '里程 (km)' },
            yAxis: { type: 'category', data: enterpriseNames, axisLabel: { fontSize: 11 } },
            series: [{
                type: 'bar', data: mileages, itemStyle: { color: '#1890ff', borderRadius: [0,4,4,0] },
                label: { show: true, position: 'right', formatter: '{c} km' }
            }]
        });
        // 趋势图
        const trend = getTrendData(period);
        const autoPercent = trend.auto.map((v,i) => (v / (v + trend.manual[i]) * 100).toFixed(1));
        if(trendChart) trendChart.dispose();
        trendChart = echarts.init(document.getElementById('trendChart'));
        trendChart.setOption({
            tooltip: { trigger: 'axis' },
            legend: { data: ['自动驾驶里程 (km)', '人工驾驶里程 (km)', '自动驾驶占比 (%)'] },
            xAxis: { type: 'category', data: trend.dates, axisLabel: { rotate: 20 } },
            yAxis: [{ type: 'value', name: '里程 (km)' }, { type: 'value', name: '占比 (%)', min: 0, max: 100 }],
            series: [
                { name: '自动驾驶里程 (km)', type: 'line', data: trend.auto, lineStyle: { color: '#52c41a', width: 3 }, areaStyle: { opacity: 0.1 } },
                { name: '人工驾驶里程 (km)', type: 'line', data: trend.manual, lineStyle: { color: '#fa8c16', width: 2 } },
                { name: '自动驾驶占比 (%)', type: 'line', yAxisIndex: 1, data: autoPercent, lineStyle: { color: '#1890ff', width: 2, type: 'dashed' }, tooltip: { valueFormatter: (v) => v + '%' } }
            ]
        });
    }

    // 渲染下方实时模块（无时间筛选）
    function renderRealtime() {
        // 当日测试情况
        const dailyContainer = document.getElementById('dailyStats');
        dailyContainer.innerHTML = `
            <div class="stat-item"><div class="stat-value">${dailyData.currentEnterprises}</div><div class="stat-label">当前测试企业数</div></div>
            <div class="stat-item"><div class="stat-value">${dailyData.currentVehicles}</div><div class="stat-label">测试车辆数</div></div>
            <div class="stat-item"><div class="stat-value">${dailyData.todayMileage.toLocaleString()} km</div><div class="stat-label">当日测试里程</div></div>
            <div class="stat-item"><div class="stat-value">${dailyData.todayDuration}</div><div class="stat-label">当日测试时长(小时)</div></div>
            <div class="stat-item"><div class="stat-value">${dailyData.passengerMileage.toLocaleString()} km</div><div class="stat-label">载人测试总里程</div></div>
            <div class="stat-item"><div class="stat-value">${dailyData.passengerDuration}</div><div class="stat-label">载人测试总时长(小时)</div></div>
        `;
        // 企业车辆统计表格
        const tbody = document.querySelector('#enterpriseVehicleTable tbody');
        tbody.innerHTML = enterpriseVehicleStats.map(item => `
            <tr><td>${item.name}</td><td>${item.testVehicles}</td><td><span class="ant-badge-green">${item.activeVehicles}</span></td></tr>
        `).join('');
        // 车辆动态列表
        renderVehicleDynamicList();
    }

    function renderVehicleDynamicList() {
        const container = document.getElementById('vehicleDynamicList');
        const modeBadge = (mode) => {
            if(mode === '自动驾驶') return '<span class="ant-badge-green">自动驾驶</span>';
            if(mode === '人工驾驶') return '<span class="ant-badge-orange">人工驾驶</span>';
            return '<span style="background:#e6f7ff;color:#1890ff;padding:2px 8px;border-radius:4px;">远程驾驶</span>';
        };
        const html = dynamicVehicles.map(v => `
            <div class="list-item">
                <div><span class="vehicle-plate">${v.plate}</span> <span style="color:#595959; margin-left:8px;">${v.enterprise}</span></div>
                <div>${modeBadge(v.mode)} <span style="margin-left: 12px; color: #aaa;">${v.time}</span></div>
            </div>
        `).join('');
        container.innerHTML = html;
        document.getElementById('totalDynamicCount').innerText = dynamicVehicles.length;
    }

    // 模拟实时数据随机微小变动 (刷新实时区域)
    function refreshRealtimeData() {
        dailyData.currentVehicles = 45 + Math.floor(Math.random() * 15);
        dailyData.todayMileage = 3000 + Math.floor(Math.random() * 800);
        dailyData.passengerMileage = 1100 + Math.floor(Math.random() * 300);
        enterpriseVehicleStats = enterpriseVehicleStats.map(item => ({
            ...item,
            activeVehicles: Math.min(item.testVehicles, Math.floor(Math.random() * (item.testVehicles+1)))
        }));
        renderRealtime();
        // 显示提示
        const toast = document.createElement('div');
        toast.innerText = '实时数据已刷新（模拟）';
        toast.style.position = 'fixed'; toast.style.bottom = '20px'; toast.style.right = '20px';
        toast.style.backgroundColor = '#52c41a'; toast.style.color = '#fff'; toast.style.padding = '6px 12px';
        toast.style.borderRadius = '20px'; toast.style.fontSize = '12px'; toast.style.zIndex = '999';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    }

    // 动态车辆列表定时刷新（模拟新上报数据）
    let dynamicInterval;
    function startDynamicRefresh() {
        if(dynamicInterval) clearInterval(dynamicInterval);
        dynamicInterval = setInterval(() => {
            const now = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            dynamicVehicles = dynamicVehicles.map((v, idx) => {
                let newTime = `2025-05-09 ${now.slice(0,5)}${Math.floor(Math.random()*60)}`;
                if(idx < 3) newTime = `2025-05-09 ${now}`;
                return { ...v, time: newTime };
            });
            if(Math.random() > 0.7) dynamicVehicles.push(dynamicVehicles.shift());
            renderVehicleDynamicList();
        }, 8000);
    }

    // 周期切换 + 刷新上方
    let currentPeriod = 'month';
    function onPeriodChange() {
        currentPeriod = document.getElementById('timeRangeSelect').value;
        renderUpperSection(currentPeriod);
    }

    // 页面初始化
    document.addEventListener('DOMContentLoaded', () => {
        renderUpperSection('month');
        renderRealtime();
        startDynamicRefresh();

        // 绑定事件
        document.getElementById('timeRangeSelect').addEventListener('change', onPeriodChange);
        document.getElementById('refreshUpperBtn').addEventListener('click', () => {
            renderUpperSection(currentPeriod);
            const toast = document.createElement('div');
            toast.innerText = '累计数据已按周期刷新';
            toast.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#1890ff; color:#fff; padding:6px 12px; border-radius:20px; font-size:12px; z-index:999';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        });
        // 实时数据单独设置一个刷新按钮? 简单做一个隐藏刷新, 但在实时区域没有刷新按钮, 可通过右上角全局刷新？为了满足需求，提供一个单独的实时刷新按钮？因为需求未明确，但可增加一个小按钮在实时区域标题旁。为了不破坏布局，在实时区域顶部加一个刷新图标。
        const realtimeHeader = document.querySelector('.ant-card-title:contains("当日测试情况")');
        // 为了用户体验，在“当日测试情况”卡片右侧添加一个手动刷新图标
        const dailyCardTitle = document.querySelector('#dailyStats').closest('.ant-card').querySelector('.ant-card-title');
        const refreshRealBtn = document.createElement('span');
        refreshRealBtn.innerHTML = '<i class="fas fa-sync-alt" style="margin-left: 12px; font-size: 12px; cursor: pointer; color: #1890ff;"></i>';
        refreshRealBtn.title = "刷新实时数据";
        refreshRealBtn.onclick = () => refreshRealtimeData();
        dailyCardTitle.appendChild(refreshRealBtn);
        // 同时在企业统计卡片也加刷新
        const enterpriseTitle = document.querySelector('#enterpriseVehicleTable').closest('.ant-card').querySelector('.ant-card-title');
        const refreshEntBtn = document.createElement('span');
        refreshEntBtn.innerHTML = '<i class="fas fa-sync-alt" style="margin-left: 12px; font-size: 12px; cursor: pointer; color: #1890ff;"></i>';
        refreshEntBtn.onclick = () => refreshRealtimeData();
        enterpriseTitle.appendChild(refreshEntBtn);
    });
    // 辅助contains选择器
    Element.prototype.containsSelector = function(selector) { return this.querySelector(selector) !== null; };
    window.addEventListener('resize', () => {
        if(barChart) barChart.resize();
        if(trendChart) trendChart.resize();
    });
</script>
</body>
</html>
