<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>异常告警情况统计</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --primary: #1890ff;
            --primary-hover: #40a9ff;
            --primary-bg: #e6f7ff;
            --success: #52c41a;
            --warning: #faad14;
            --error: #f5222d;
            --text-primary: #262626;
            --text-secondary: #595959;
            --text-tertiary: #8c8c8c;
            --border: #d9d9d9;
            --border-light: #f0f0f0;
            --bg: #f0f2f5;
            --bg-white: #fff;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.03);
            --radius: 6px;
            --radius-lg: 8px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:var(--font); background:var(--bg); color:var(--text-primary); line-height:1.5; }
        .app-header { background:#001529; color:#fff; padding:0 32px; height:56px; display:flex; align-items:center; position:sticky; top:0; z-index:100; }
        .app-header .logo { display:flex; align-items:center; gap:12px; font-size:18px; font-weight:600; }
        .app-body { max-width:1500px; margin:0 auto; padding:20px 28px 40px; }
        .page-title { font-size:20px; font-weight:600; margin-bottom:18px; }
        .query-bar { background:var(--bg-white); border-radius:var(--radius-lg); padding:16px 22px; margin-bottom:16px; display:flex; flex-wrap:wrap; align-items:flex-end; gap:14px; box-shadow:var(--shadow-sm); border:1px solid var(--border-light); }
        .form-group { display:flex; flex-direction:column; gap:5px; min-width:130px; }
        .form-group label { font-size:12px; font-weight:500; color:var(--text-tertiary); text-transform:uppercase; }
        select, input { height:34px; padding:0 10px; border:1px solid var(--border); border-radius:4px; font-size:13px; font-family:var(--font); color:var(--text-primary); background:#fff; outline:none; min-width:120px; }
        select:focus, input:focus { border-color:var(--primary); box-shadow:0 0 0 2px rgba(24,144,255,0.12); }
        .btn { height:34px; padding:0 18px; border:none; border-radius:4px; cursor:pointer; font-size:13px; font-weight:500; font-family:var(--font); display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-primary:hover { background:var(--primary-hover); }
        .btn-outline { background:#fff; color:var(--primary); border:1px solid var(--primary); }
        .btn-outline:hover { background:var(--primary-bg); }
        .btn-sm { height:28px; padding:0 12px; font-size:12px; }
        .btn-link { background:transparent; color:var(--primary); border:none; padding:0 4px; height:auto; cursor:pointer; font-weight:500; font-size:12px; }
        .stat-cards { display:grid; grid-template-columns:repeat(6,1fr); gap:14px; margin-bottom:16px; }
        .stat-card { background:var(--bg-white); border-radius:var(--radius-lg); padding:16px; box-shadow:var(--shadow-sm); border:1px solid var(--border-light); text-align:center; }
        .stat-card .sv { font-size:28px; font-weight:700; }
        .stat-card .sl { font-size:11px; color:var(--text-tertiary); margin-top:4px; }
        .card { background:var(--bg-white); border-radius:var(--radius-lg); padding:20px; box-shadow:var(--shadow-sm); border:1px solid var(--border-light); margin-bottom:16px; }
        .card-header { font-size:14px; font-weight:600; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; }
        .chart-container { min-height:300px; }
        .row-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        .row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
        .row-1 { display:grid; grid-template-columns:1fr; gap:14px; }
        .map-container { height:360px; border-radius:6px; overflow:hidden; }
        .table-wrap { overflow-x:auto; margin-top:8px; }
        table { width:100%; border-collapse:collapse; font-size:12px; }
        th { background:#fafafa; padding:10px 12px; text-align:left; font-weight:600; color:var(--text-secondary); border-bottom:1px solid var(--border-light); white-space:nowrap; font-size:11px; text-transform:uppercase; }
        td { padding:8px 12px; border-bottom:1px solid #f5f5f5; }
        tbody tr:hover { background:#fafafa; }
        .tag { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:500; }
        .tag-red { background:#fff1f0; color:#cf1322; }
        .tag-orange { background:#fff7e6; color:#d46b08; }
        .tag-yellow { background:#fffbe6; color:#d4b106; }
        .tag-green { background:#f6ffed; color:#389e0d; }
        .tag-blue { background:#e6f7ff; color:#096dd9; }
        .pagination { display:flex; align-items:center; justify-content:flex-end; gap:8px; margin-top:12px; font-size:12px; }
        .pagination select { width:80px; height:28px; }
        .modal-mask { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.45); z-index:200; align-items:center; justify-content:center; }
        .modal-mask.show { display:flex; }
        .modal { background:#fff; border-radius:8px; width:680px; max-height:80vh; display:flex; flex-direction:column; box-shadow:0 6px 16px rgba(0,0,0,0.1); }
        .modal-header { padding:16px 24px; border-bottom:1px solid var(--border-light); display:flex; align-items:center; justify-content:space-between; font-weight:600; }
        .modal-body { padding:16px 24px; overflow-y:auto; flex:1; }
        @media (max-width:1200px) { .stat-cards{grid-template-columns:repeat(3,1fr);} .row-2,.row-3{grid-template-columns:1fr;} }
        @media (max-width:768px) { .stat-cards{grid-template-columns:repeat(2,1fr);} }
    </style>
</head>
<body>
<header class="app-header"><div class="logo"><span class="icon" style="margin-right:8px;">⚠️</span>异常告警情况统计</div></header>
<div class="app-body">
    <!-- 筛选条件 -->
    <div class="query-bar">
        <div class="form-group"><label>时间范围</label><input type="date" value="2026-04-20"> - <input type="date" value="2026-05-08"></div>
        <div class="form-group"><label>告警类型</label><select multiple><option selected>全部</option><option>碰撞预警</option><option>车道偏离</option><option>超速</option><option>疲劳驾驶</option><option>信号丢失</option></select></div>
        <div class="form-group"><label>告警级别</label><select><option>全部</option><option>严重</option><option>重要</option><option>一般</option></select></div>
        <div class="form-group"><label>企业</label><select><option>全部</option><option>襄阳智行科技</option><option>汉江出行</option><option>顺捷科技</option></select></div>
        <div class="form-group"><label>行政区域</label><select><option>全部</option><option>樊城区</option><option>襄城区</option><option>襄州区</option></select></div>
        <div class="form-group"><label>车牌号/VIN</label><input placeholder="请输入"></div>
        <button class="btn btn-primary">🔍 查询</button>
        <button class="btn btn-outline">📥 导出Excel</button>
    </div>

    <!-- 统计卡片 -->
    <div class="stat-cards">
        <div class="stat-card"><div class="sv" style="color:#f5222d;">186</div><div class="sl">当日告警总数</div></div>
        <div class="stat-card"><div class="sv" style="color:#fa8c16;">24</div><div class="sl">未处理告警</div></div>
        <div class="stat-card"><div class="sv" style="color:#1890ff;">18</div><div class="sl">处理中告警</div></div>
        <div class="stat-card"><div class="sv" style="color:#52c41a;">144</div><div class="sl">已处理告警</div></div>
        <div class="stat-card"><div class="sv">87.1%</div><div class="sl">告警处理率</div></div>
        <div class="stat-card"><div class="sv" style="color:#f5222d;">32.3%</div><div class="sl">严重告警占比</div></div>
    </div>

    <!-- 图表区域第一行 -->
    <div class="row-2">
        <div class="card">
            <div class="card-header">告警类型分布</div>
            <div class="chart-container" id="chartTypePie"></div>
        </div>
        <div class="card">
            <div class="card-header">告警级别分布</div>
            <div class="chart-container" id="chartLevelBar"></div>
        </div>
    </div>

    <!-- 图表区域第二行 -->
    <div class="row-2">
        <div class="card">
            <div class="card-header">告警趋势（近30天）</div>
            <div class="chart-container" id="chartTrend"></div>
        </div>
        <div class="card">
            <div class="card-header">企业告警排名 Top10</div>
            <div class="chart-container" id="chartCompanyRank"></div>
        </div>
    </div>

    <!-- 告警热点地图 -->
    <div class="card">
        <div class="card-header">告警热点地图 <span style="font-weight:400;font-size:12px;">点位颜色按级别：<span style="color:#f5222d;">●严重</span> <span style="color:#fa8c16;">●重要</span> <span style="color:#1890ff;">●一般</span></span></div>
        <div id="alertMap" class="map-container"></div>
    </div>

    <!-- 告警明细列表 -->
    <div class="card">
        <div class="card-header">告警明细列表</div>
        <div class="table-wrap">
            <table id="alertTable">
                <thead><tr><th>告警编号</th><th>时间</th><th>类型</th><th>级别</th><th>车牌号</th><th>VIN码</th><th>所属企业</th><th>地点</th><th>处理状态</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="pagination">
            <span>共 <b id="totalCount">186</b> 条</span>
            <select id="pageSize"><option>20</option><option>50</option><option>100</option></select>
            <span>条/页</span>
            <button class="btn btn-sm btn-outline" id="prevPage">上一页</button>
            <span>第 <b id="currentPage">1</b> / <b id="totalPages">10</b> 页</span>
            <button class="btn btn-sm btn-outline" id="nextPage">下一页</button>
        </div>
    </div>
</div>

<!-- 告警详情弹窗 -->
<div class="modal-mask" id="modalMask">
    <div class="modal">
        <div class="modal-header"><span id="modalTitle">告警详情</span><button class="btn btn-sm btn-outline" onclick="closeModal()">关闭</button></div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
(function() {
    // 模拟数据
    const alertTypes = ['碰撞预警','车道偏离','超速','疲劳驾驶','信号丢失','急加速','急减速'];
    const levels = ['严重','重要','一般'];
    const companies = ['襄阳智行科技','汉江出行','顺捷科技','东风出行','百度Apollo'];
    const plates = ['鄂F·A1234','鄂F·B5678','鄂F·C3456','鄂F·D7890','鄂F·E9012'];
    const vins = ['LSVAA4189N2000001','LSVAA4189N2000002','LSVAA4189N2000003','LSVAA4189N2000004','LSVAA4189N2000005'];
    const locations = ['长虹路建华路口','檀溪路铁佛寺路口','航空路金富士路口','人民路天元四季城','建设路银城大道口'];
    const statuses = ['未处理','处理中','已处理'];

    // 生成随机告警列表
    function generateAlerts(count=186) {
        const arr = [];
        for(let i=0;i<count;i++){
            const date = new Date(2026,4,8); // 2026-05-08
            date.setHours(0,0,0,0);
            date.setMinutes(Math.floor(Math.random()*1440));
            arr.push({
                id: `ALT-20260508-${String(i+1).padStart(4,'0')}`,
                time: date.toISOString().replace('T',' ').substring(0,16),
                type: alertTypes[Math.floor(Math.random()*alertTypes.length)],
                level: levels[Math.floor(Math.random()*levels.length)],
                plate: plates[Math.floor(Math.random()*plates.length)],
                vin: vins[Math.floor(Math.random()*vins.length)],
                company: companies[Math.floor(Math.random()*companies.length)],
                location: locations[Math.floor(Math.random()*locations.length)],
                status: statuses[Math.floor(Math.random()*statuses.length)],
            });
        }
        return arr;
    }
    const allAlerts = generateAlerts(186);
    let currentPage = 1;
    const pageSize = 20;

    function renderTable(page=1){
        const tbody = document.querySelector('#alertTable tbody');
        const start = (page-1)*pageSize;
        const end = start + pageSize;
        const pageData = allAlerts.slice(start, end);
        tbody.innerHTML = pageData.map(a=>{
            const levelTag = a.level==='严重'?'tag-red':(a.level==='重要'?'tag-orange':'tag-blue');
            const statusTag = a.status==='未处理'?'tag-red':(a.status==='处理中'?'tag-orange':'tag-green');
            return `<tr>
                <td>${a.id}</td><td>${a.time}</td><td>${a.type}</td>
                <td><span class="tag ${levelTag}">${a.level}</span></td>
                <td>${a.plate}</td><td>${a.vin}</td><td>${a.company}</td>
                <td>${a.location}</td><td><span class="tag ${statusTag}">${a.status}</span></td>
                <td><button class="btn-link btn-sm" onclick="openDetail('${a.id}')">详情</button></td>
            </tr>`;
        }).join('');
        document.getElementById('totalCount').textContent = allAlerts.length;
        document.getElementById('currentPage').textContent = page;
        document.getElementById('totalPages').textContent = Math.ceil(allAlerts.length/pageSize);
    }

    window.openDetail = function(id) {
        const alert = allAlerts.find(a=>a.id===id) || allAlerts[0];
        const html = `
            <p><b>告警编号：</b>${alert.id}</p>
            <p><b>时间：</b>${alert.time}</p>
            <p><b>类型：</b>${alert.type} | <b>级别：</b><span class="tag ${alert.level==='严重'?'tag-red':alert.level==='重要'?'tag-orange':'tag-blue'}">${alert.level}</span></p>
            <p><b>车辆：</b>${alert.plate} | VIN：${alert.vin} | 企业：${alert.company}</p>
            <p><b>地点：</b>${alert.location}</p>
            <p><b>处理状态：</b><span class="tag ${alert.status==='未处理'?'tag-red':alert.status==='处理中'?'tag-orange':'tag-green'}">${alert.status}</span></p>
            <p><b>关联事件：</b>前方障碍物检测、自动紧急制动触发</p>
            <p><b>数据来源：</b>车端CAN总线 + 路侧RSU</p>
        `;
        document.getElementById('modalTitle').textContent = '告警详情 - ' + id;
        document.getElementById('modalBody').innerHTML = html;
        document.getElementById('modalMask').classList.add('show');
    };
    window.closeModal = function(){ document.getElementById('modalMask').classList.remove('show'); };

    // 分页
    document.getElementById('prevPage').addEventListener('click',()=>{
        if(currentPage>1){ currentPage--; renderTable(currentPage); }
    });
    document.getElementById('nextPage').addEventListener('click',()=>{
        const total = Math.ceil(allAlerts.length/pageSize);
        if(currentPage<total){ currentPage++; renderTable(currentPage); }
    });
    document.getElementById('pageSize').addEventListener('change',(e)=>{
        pageSize = parseInt(e.target.value);
        currentPage = 1;
        renderTable(currentPage);
    });
    renderTable(1);

    // ECharts 图表
    const chartInstances = {};
    function initChart(id) {
        const dom = document.getElementById(id);
        if(!dom) return null;
        if(chartInstances[id]) chartInstances[id].dispose();
        const chart = echarts.init(dom);
        chartInstances[id] = chart;
        return chart;
    }

    // 告警类型分布饼图
    const chart1 = initChart('chartTypePie');
    chart1.setOption({
        tooltip:{trigger:'item'},
        series:[{type:'pie',radius:['45%','70%'],data:[
            {value:62,name:'碰撞预警'},{value:45,name:'车道偏离'},{value:32,name:'超速'},
            {value:21,name:'疲劳驾驶'},{value:15,name:'信号丢失'},{value:11,name:'其他'}
        ],label:{formatter:'{b}: {d}%'}}]
    });

    // 告警级别分布柱状图
    const chart2 = initChart('chartLevelBar');
    chart2.setOption({
        tooltip:{}, xAxis:{data:['严重','重要','一般']}, yAxis:{name:'告警数'},
        series:[{type:'bar',data:[60,72,54],itemStyle:{color:function(p){
            return p.dataIndex===0?'#f5222d':p.dataIndex===1?'#fa8c16':'#1890ff';
        }},barWidth:'50%'}]
    });

    // 告警趋势
    const chart3 = initChart('chartTrend');
    const days = [];
    const trendData = [];
    for(let i=29;i>=0;i--){
        const d = new Date(2026,4,8);
        d.setDate(d.getDate()-i);
        days.push((d.getMonth()+1)+'/'+d.getDate());
        trendData.push(Math.floor(50+Math.random()*40));
    }
    chart3.setOption({
        tooltip:{}, xAxis:{data:days,axisLabel:{rotate:30}}, yAxis:{name:'告警数'},
        series:[{type:'line',data:trendData,lineStyle:{color:'#1890ff'},areaStyle:{color:'rgba(24,144,255,0.15)'},smooth:true}],
        grid:{left:40,right:20,top:10,bottom:40}
    });

    // 企业告警排名
    const chart4 = initChart('chartCompanyRank');
    const companyData = companies.map(c=>({name:c,value:Math.floor(20+Math.random()*50)})).sort((a,b)=>b.value-a.value);
    chart4.setOption({
        tooltip:{}, yAxis:{type:'category',data:companyData.map(c=>c.name).reverse(),inverse:true},
        xAxis:{type:'value',name:'告警数'},
        series:[{type:'bar',data:companyData.map(c=>c.value).reverse(),barWidth:'60%',itemStyle:{color:'#1890ff'},label:{show:true,position:'right'}}],
        grid:{left:100,right:50,top:10,bottom:10}
    });

    // Leaflet 地图
    let map;
    function initMap(){
        const container = document.getElementById('alertMap');
        if(!container) return;
        if(map) map.remove();
        map = L.map(container).setView([32.02,112.12],12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);
        // 随机生成点位
        for(let i=0;i<80;i++){
            const lat = 31.76 + Math.random()*0.35;
            const lng = 111.70 + Math.random()*0.55;
            const level = levels[Math.floor(Math.random()*3)];
            const color = level==='严重'?'#f5222d':level==='重要'?'#fa8c16':'#1890ff';
            L.circleMarker([lat,lng],{radius:5+Math.random()*4,fillColor:color,color:'#fff',weight:1,fillOpacity:0.8})
             .addTo(map).bindPopup(`<b>${level}告警</b><br>地点：${locations[Math.floor(Math.random()*5)]}`);
        }
    }

    function resizeAll(){
        Object.values(chartInstances).forEach(c=>{if(c&&!c.isDisposed())c.resize();});
        if(map) map.invalidateSize();
    }
    window.addEventListener('resize',()=>{clearTimeout(window._rt);window._rt=setTimeout(resizeAll,200);});

    initMap();
    // 初始渲染表格
})();
</script>
</body>
</html>
