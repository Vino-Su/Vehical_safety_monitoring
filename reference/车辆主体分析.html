<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事故分析研判 - 车辆主体分析</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js">
    </script>
    <style>
        :root {
            --primary: #1890ff;
            --primary-hover: #40a9ff;
            --primary-bg: #e6f7ff;
            --success: #52c41a;
            --warning: #faad14;
            --error: #f5222d;
            --text-primary: #262626;
            --text-secondary: #595959;
            --text-tertiary: #8c8c8c;
            --border: #d9d9d9;
            --border-light: #f0f0f0;
            --bg: #f0f2f5;
            --bg-white: #fff;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.03);
            --shadow: 0 1px 2px -2px rgba(0,0,0,0.16),0 3px 6px 0 rgba(0,0,0,0.12);
            --radius: 6px;
            --radius-lg: 8px;
            --font: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font);background:var(--bg);color:var(--text-primary);line-height:1.5715;min-height:100vh;-webkit-font-smoothing:antialiased}
        .app-layout{display:flex;height:100vh}
        .sidebar{width:240px;background:#001529;color:#fff;flex-shrink:0;display:flex;flex-direction:column;box-shadow:2px 0 8px rgba(0,0,0,0.15)}
        .sidebar-logo{padding:18px 20px;font-size:16px;font-weight:600;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.1);letter-spacing:0.5px}
        .sidebar-logo .icon{width:32px;height:32px;border-radius:var(--radius);background:var(--error);display:flex;align-items:center;justify-content:center;font-size:16px}
        .sidebar-menu{flex:1;padding:8px 0;overflow-y:auto}
        .menu-group-title{padding:14px 20px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.4);font-weight:600}
        .menu-item{display:flex;align-items:center;gap:10px;padding:11px 20px;font-size:13px;color:rgba(255,255,255,0.75);cursor:pointer;transition:all 0.2s;border-left:3px solid transparent;user-select:none}
        .menu-item:hover{background:rgba(255,255,255,0.05);color:#fff}
        .menu-item.active{background:rgba(24,144,255,0.2);color:#fff;border-left-color:var(--primary);font-weight:500}
        .main-content{flex:1;overflow-y:auto;padding:20px 24px 30px;background:var(--bg)}
        .page-header{margin-bottom:16px}
        .page-title{font-size:20px;font-weight:600;color:var(--text-primary);margin-bottom:4px}
        .page-subtitle{font-size:13px;color:var(--text-tertiary)}
        .stat-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
        .stat-card{background:var(--bg-white);border-radius:var(--radius-lg);padding:18px 20px;box-shadow:var(--shadow-sm);border:1px solid var(--border-light);display:flex;flex-direction:column;gap:6px;transition:0.2s}
        .stat-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
        .stat-card .stat-label{font-size:12px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;font-weight:500}
        .stat-card .stat-value{font-size:26px;font-weight:700;letter-spacing:-0.5px}
        .stat-card .stat-sub{font-size:11px;color:var(--text-tertiary)}
        .stat-card.accent-red{border-left:3px solid var(--error)}
        .stat-card.accent-orange{border-left:3px solid var(--warning)}
        .stat-card.accent-green{border-left:3px solid var(--success)}
        .stat-card.accent-blue{border-left:3px solid var(--primary)}
        .query-bar{background:var(--bg-white);border-radius:var(--radius-lg);padding:14px 20px;margin-bottom:16px;display:flex;flex-wrap:wrap;align-items:flex-end;gap:12px;box-shadow:var(--shadow-sm);border:1px solid var(--border-light)}
        .form-group{display:flex;flex-direction:column;gap:4px;min-width:110px}
        .form-group label{font-size:11px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.4px}
        select,input{height:32px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);background:#fff;outline:none;min-width:100px;transition:all 0.2s}
        select:focus,input:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(24,144,255,0.2)}
        .btn{height:32px;padding:0 14px;border:none;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:500;font-family:var(--font);transition:all 0.2s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
        .btn-primary{background:var(--primary);color:#fff}
        .btn-primary:hover{background:var(--primary-hover)}
        .btn-default{background:#fff;color:var(--text-primary);border:1px solid var(--border)}
        .btn-default:hover{color:var(--primary);border-color:var(--primary)}
        .btn-sm{height:26px;padding:0 10px;font-size:12px}
        .btn-link{background:transparent;color:var(--primary);border:none;padding:0 3px;height:auto;cursor:pointer;font-weight:400;font-size:12px}
        .btn-link:hover{color:var(--primary-hover);text-decoration:underline}
        .card{background:var(--bg-white);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border-light);margin-bottom:16px}
        .card-header{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
        .chart-container{min-height:300px}
        .row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        .row-1{display:grid;grid-template-columns:1fr;gap:14px}
        .table-wrap{overflow-x:auto;margin-top:6px}
        table{width:100%;border-collapse:collapse;font-size:13px}
        th{background:#fafafa;padding:10px 14px;text-align:left;font-weight:600;color:var(--text-secondary);border-bottom:1px solid var(--border-light);white-space:nowrap;font-size:11px;text-transform:uppercase;cursor:pointer}
        th:hover{background:#f0f0f0}
        td{padding:10px 14px;border-bottom:1px solid #f5f5f5}
        tbody tr:hover{background:#fafafa;cursor:pointer}
        .tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;white-space:nowrap}
        .tag-red{background:#fff1f0;color:#cf1322}
        .tag-orange{background:#fff7e6;color:#d46b08}
        .tag-green{background:#f6ffed;color:#389e0d}
        .tag-blue{background:#e6f7ff;color:#096dd9}
        .pagination-bar{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:14px;font-size:12px;color:var(--text-secondary)}
        .pagination-bar select{width:70px;height:28px}
        .pagination-bar .btn-sm{height:28px}
        .modal-mask{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:1000;align-items:center;justify-content:center}
        .modal-mask.show{display:flex}
        .modal{background:#fff;border-radius:8px;width:820px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 6px 16px rgba(0,0,0,0.1)}
        .modal-header{padding:14px 20px;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center;font-weight:600}
        .modal-body{padding:16px 20px;overflow-y:auto;flex:1;font-size:13px;line-height:1.8}
        .map-container{height:200px;border-radius:6px;overflow:hidden;margin:10px 0}
        @media (max-width:1200px){.stat-cards{grid-template-columns:repeat(2,1fr)}.row-2{grid-template-columns:1fr}}
        @media (max-width:768px){.app-layout{flex-direction:column}.sidebar{width:100%;height:auto;flex-direction:row;overflow-x:auto}.sidebar-menu{display:flex;padding:0}.menu-item{padding:10px 14px;border-left:none;border-bottom:2px solid transparent}.menu-item.active{border-bottom-color:var(--primary)}.main-content{padding:12px}.stat-cards{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-logo"><span class="icon">🛡️</span>事故分析研判</div>
        <nav class="sidebar-menu">
            <div class="menu-group-title">研判分析</div>
            <div class="menu-item" data-page="hotspot">📍 多发地点分析</div>
            <div class="menu-item" data-page="risk">⚠️ 风险区域分析</div>
            <div class="menu-item" data-page="trend">📈 事故趋势分析</div>
            <div class="menu-item active" data-page="vehicle">🚗 车辆主体分析</div>
            <div class="menu-group-title">决策输出</div>
            <div class="menu-item" data-page="report">📋 分析报告与建议</div>
        </nav>
    </aside>
    <main class="main-content">
        <div class="page-header"><div class="page-title">车辆主体分析</div><div class="page-subtitle">从车辆品牌、车型、运营企业等维度进行事故归因统计与风险水平评估</div></div>
        <div class="query-bar">
            <div class="form-group"><label>时间范围</label><div style="display:flex;gap:4px;align-items:center;"><input type="date" value="2026-04-01" style="width:130px;"><span>-</span><input type="date" value="2026-05-08" style="width:130px;"></div></div>
            <div class="form-group"><label>分析维度</label><select id="dimSelect"><option>按企业</option><option>按品牌</option><option>按车型</option></select></div>
            <div class="form-group"><label>自动驾驶等级</label><select><option>全部</option><option>L2</option><option>L3</option><option>L4</option></select></div>
            <button class="btn btn-primary" onclick="refreshData()">🔍 分析</button>
            <button class="btn btn-default" onclick="showToast('导出成功')">📥 导出Excel</button>
        </div>
        <div class="stat-cards" id="statCards"></div>
        <div class="row-2">
            <div class="card"><div class="card-header" id="rankTitle">企业事故数量排名 Top10</div><div class="chart-container" id="chartRankBar"></div></div>
            <div class="card"><div class="card-header">风险评分雷达图（多主体对比）</div><div class="chart-container" id="chartRadar"></div></div>
        </div>
        <div class="row-1">
            <div class="card"><div class="card-header">有责事故占比对比</div><div class="chart-container" id="chartFaultBar"></div></div>
        </div>
        <div class="card">
            <div class="card-header">主体风险清单 <span style="font-weight:400;font-size:12px;color:var(--text-tertiary);">共 <span id="listCount">10</span> 条 | 点击行查看详情</span></div>
            <div class="table-wrap"><table><thead><tr><th>主体名称</th><th>主体类型</th><th>事故数量</th><th>死亡</th><th>受伤</th><th>有责事故占比</th><th>风险评分</th><th>风险等级</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table></div>
            <div class="pagination-bar"><span>共 <b>10</b> 条</span><select><option>10</option></select><span>条/页</span><button class="btn btn-sm btn-default" disabled>上一页</button><span>第 <b>1</b>/<b>1</b> 页</span><button class="btn btn-sm btn-default" disabled>下一页</button></div>
        </div>
    </main>
</div>
<div class="modal-mask" id="detailModal"><div class="modal"><div class="modal-header"><span id="modalTitle"></span><button class="btn btn-sm btn-default" onclick="closeModal()">✕ 关闭</button></div><div class="modal-body" id="modalBody"></div></div></div>

<script>
(function(){
    const chartInstances={};
    function initChart(id){const dom=document.getElementById(id);if(!dom)return null;if(chartInstances[id])chartInstances[id].dispose();const c=echarts.init(dom);chartInstances[id]=c;return c;}
    function resizeAll(){Object.values(chartInstances).forEach(c=>{if(c&&!c.isDisposed())c.resize();});}
    window.addEventListener('resize',()=>{clearTimeout(window._rt);window._rt=setTimeout(resizeAll,200);});
    function showToast(msg){const t=document.createElement('div');t.style.cssText='position:fixed;top:20px;right:20px;z-index:999;background:#fff;padding:12px 20px;border-radius:6px;box-shadow:0 6px 16px rgba(0,0,0,0.1);font-size:13px;border-left:3px solid #1890ff;';t.textContent='✅ '+msg;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='0.3s';setTimeout(()=>t.remove(),300)},2000);}

    const subjects = [
        {name:'襄阳智行科技',type:'企业',accidents:85,deaths:2,injuries:15,faultRatio:'35%',riskScore:72,risk:'高'},
        {name:'汉江出行',type:'企业',accidents:62,deaths:3,injuries:18,faultRatio:'42%',riskScore:78,risk:'高'},
        {name:'顺捷科技',type:'企业',accidents:38,deaths:0,injuries:8,faultRatio:'22%',riskScore:45,risk:'低'},
        {name:'东风出行',type:'企业',accidents:55,deaths:1,injuries:12,faultRatio:'30%',riskScore:58,risk:'中'},
        {name:'百度Apollo',type:'企业',accidents:42,deaths:0,injuries:6,faultRatio:'18%',riskScore:38,risk:'低'},
        {name:'滴滴自动驾驶',type:'企业',accidents:48,deaths:1,injuries:10,faultRatio:'28%',riskScore:52,risk:'中'},
        {name:'小马智行',type:'企业',accidents:25,deaths:0,injuries:4,faultRatio:'15%',riskScore:30,risk:'低'},
        {name:'东风品牌',type:'品牌',accidents:95,deaths:3,injuries:22,faultRatio:'38%',riskScore:76,risk:'高'},
        {name:'比亚迪品牌',type:'品牌',accidents:45,deaths:1,injuries:8,faultRatio:'25%',riskScore:42,risk:'低'},
        {name:'轿车车型',type:'车型',accidents:120,deaths:4,injuries:30,faultRatio:'32%',riskScore:68,risk:'中'}
    ];

    function renderStats(){
        const high=subjects.filter(s=>s.risk==='高').length;
        const mid=subjects.filter(s=>s.risk==='中').length;
        const low=subjects.filter(s=>s.risk==='低').length;
        document.getElementById('statCards').innerHTML=`
            <div class="stat-card accent-blue"><span class="stat-label">主体总数</span><span class="stat-value" style="color:#1890ff;">${subjects.length}</span><span class="stat-sub">全部统计主体</span></div>
            <div class="stat-card accent-red"><span class="stat-label">高风险主体</span><span class="stat-value" style="color:#f5222d;">${high}</span></div>
            <div class="stat-card accent-orange"><span class="stat-label">中风险主体</span><span class="stat-value" style="color:#fa8c16;">${mid}</span></div>
            <div class="stat-card accent-green"><span class="stat-label">低风险主体</span><span class="stat-value" style="color:#52c41a;">${low}</span></div>
        `;
    }

    function renderTable(data=subjects.slice(0,10)){
        document.getElementById('listCount').textContent=data.length;
        document.getElementById('tableBody').innerHTML=data.map(s=>{
            const riskTag=s.risk==='高'?'tag-red':s.risk==='中'?'tag-orange':'tag-green';
            return `<tr onclick="openDetail('${s.name}')">
                <td><strong>${s.name}</strong></td><td>${s.type}</td><td>${s.accidents}</td><td>${s.deaths}</td><td>${s.injuries}</td><td>${s.faultRatio}</td><td><strong>${s.riskScore}</strong></td><td><span class="tag ${riskTag}">${s.risk}</span></td><td><button class="btn-link" onclick="event.stopPropagation();openDetail('${s.name}')">查看详情</button></td></tr>`;
        }).join('');
    }

    window.openDetail=function(name){
        const s=subjects.find(x=>x.name===name)||subjects[0];
        const riskTag=s.risk==='高'?'tag-red':s.risk==='中'?'tag-orange':'tag-green';
        const strategy=s.risk==='高'?'建议限制新增测试车辆数量、提高准入审核频次、要求提交专项整改报告':s.risk==='中'?'建议持续关注、针对性开展安全培训、定期提交运行报告':'常规管理，在资源分配、审批流程等方面可优先或简化';
        const html=`
            <p><b>主体：</b>${s.name} | <b>类型：</b>${s.type} | <b>风险等级：</b><span class="tag ${riskTag}">${s.risk}</span> | <b>风险评分：</b>${s.riskScore}</p>
            <p><b>事故数量：</b>${s.accidents} | <b>死亡：</b>${s.deaths} | <b>受伤：</b>${s.injuries} | <b>有责占比：</b>${s.faultRatio}</p>
            <p><b>监管建议：</b>${strategy}</p>
            <div class="map-container" id="detailMap"></div>
            <p style="font-weight:600;margin-top:10px;">事故明细列表（最近5条）</p>
            <div class="table-wrap"><table><thead><tr><th>事故编号</th><th>时间</th><th>类型</th><th>严重程度</th><th>地点</th></tr></thead><tbody>
                ${Array.from({length:5},(_,i)=>`<tr><td>ACC-${s.name.substring(0,2)}-${i+1}</td><td>2026-05-0${i+1}</td><td>${['追尾','碰撞','刮擦'][i%3]}</td><td><span class="tag ${['tag-red','tag-orange','tag-green'][i%3]}">${['重伤','轻伤','无伤亡'][i%3]}</span></td><td>${['长虹路','檀溪路','航空路'][i%3]}</td></tr>`).join('')}
            </tbody></table></div>
        `;
        document.getElementById('modalTitle').textContent='主体风险画像 - '+s.name;
        document.getElementById('modalBody').innerHTML=html;
        document.getElementById('detailModal').classList.add('show');
        setTimeout(()=>{
            const mapDom=document.getElementById('detailMap');
            if(mapDom && !mapDom._leaflet){
                const m=L.map(mapDom).setView([32.0,112.12],12);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(m);
                for(let i=0;i<8;i++){L.circleMarker([31.78+Math.random()*0.35,111.7+Math.random()*0.5],{radius:4+Math.random()*3,fillColor:'#f5222d',color:'#fff',weight:1,fillOpacity:0.7}).addTo(m).bindPopup('事故点位');}
                mapDom._leaflet=m;
            }
        },300);
    };
    window.closeModal=function(){document.getElementById('detailModal').classList.remove('show');};
    document.getElementById('detailModal').addEventListener('click',function(e){if(e.target===this)closeModal();});

    function renderCharts(dim='企业'){
        const dimSubjects=subjects.filter(s=>dim==='企业'?s.type==='企业':dim==='品牌'?s.type==='品牌':s.type==='车型');
        document.getElementById('rankTitle').textContent=`${dim}事故数量排名 Top10`;
        const c1=initChart('chartRankBar');
        c1.setOption({
            tooltip:{},grid:{left:100,right:50,top:10,bottom:20},
            yAxis:{type:'category',data:dimSubjects.map(s=>s.name).reverse(),inverse:true,axisLabel:{fontSize:10}},
            xAxis:{type:'value',name:'事故数'},
            series:[{type:'bar',data:dimSubjects.map(s=>s.accidents).reverse(),barWidth:'60%',itemStyle:{color:'#1890ff',borderRadius:[0,4,4,0]},label:{show:true,position:'right',fontSize:10}}]
        });
        const c2=initChart('chartRadar');
        const top3=dimSubjects.slice(0,3);
        const maxAcc=Math.max(...top3.map(s=>s.accidents),1);
        const maxFault=Math.max(...top3.map(s=>parseInt(s.faultRatio)),1);
        c2.setOption({
            radar:{indicator:[{name:'事故数量',max:maxAcc},{name:'有责占比',max:maxFault},{name:'伤亡人数',max:Math.max(...top3.map(s=>s.deaths+s.injuries),1)},{name:'风险评分',max:100}],center:['50%','55%'],radius:'65%'},
            series:top3.map((s,i)=>({type:'radar',name:s.name,data:[{value:[s.accidents,parseInt(s.faultRatio),s.deaths+s.injuries,s.riskScore],name:s.name}],areaStyle:{color:['rgba(24,144,255,0.15)','rgba(250,140,22,0.15)','rgba(82,196,26,0.15)'][i]},itemStyle:{color:['#1890ff','#fa8c16','#52c41a'][i]}})),
            legend:{bottom:0}
        });
        const c3=initChart('chartFaultBar');
        c3.setOption({
            tooltip:{},grid:{left:80,right:30,top:10,bottom:30},
            xAxis:{type:'category',data:dimSubjects.map(s=>s.name),axisLabel:{rotate:30,fontSize:9}},
            yAxis:{type:'value',name:'有责占比(%)'},
            series:[{type:'bar',data:dimSubjects.map(s=>parseInt(s.faultRatio)),barWidth:'50%',itemStyle:{color:'#fa8c16',borderRadius:[4,4,0,0]},label:{show:true,position:'top',fontSize:10,formatter:'{c}%'}}]
        });
    }

    function refreshData(){
        const dim=document.getElementById('dimSelect').value.replace('按','');
        renderStats();
        renderTable(subjects.filter(s=>dim==='企业'?s.type==='企业':dim==='品牌'?s.type==='品牌':s.type==='车型').slice(0,10));
        renderCharts(dim);
        showToast('数据已刷新');
    }

    document.getElementById('dimSelect').addEventListener('change',refreshData);
    document.querySelectorAll('.menu-item').forEach(item=>{item.addEventListener('click',function(){document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));this.classList.add('active');if(this.dataset.page!=='vehicle')showToast('该功能建设中，当前仅演示车辆主体分析');});});

    renderStats();
    renderTable();
    renderCharts('企业');
    window.addEventListener('resize',resizeAll);
})();
</script>
</body>
</html>
