<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>йҒ“и·Ҝиө„жәҗеҸҜи§ҶеҢ?- ејҖж”ҫйҒ“и·Ҝиө„жәҗз®Ўзҗ?/title>
    <style>
        :root {
            --primary: #1677ff;
            --success: #52c41a;
            --warning: #fa8c16;
            --error: #ff4d4f;
            --bg: #f0f2f5;
            --bg-white: #fff;
            --border: #e8e8e8;
            --text: #1f1f1f;
            --text-secondary: #666;
            --text-muted: #999;
            --radius: 8px;
            --shadow: 0 1px 2px rgba(0, 0, 0, 0.03), 0 1px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 6px 16px rgba(0, 0, 0, 0.08), 0 3px 6px -4px rgba(0, 0, 0, 0.12);
            --transition: all 0.2s cubic-bezier(0.645, 0.045, 0.355, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            overflow: hidden;
        }

        /* йЎ¶йғЁеҜјиҲӘ */
        .app-header {
            height: 48px;
            background: #001529;
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 14px;
            gap: 12px;
            flex-shrink: 0;
            z-index: 100;
            position: relative;
        }
        .app-header .logo {
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .app-header .logo .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #52c41a;
            box-shadow: 0 0 6px #52c41a;
        }
        .breadcrumb {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.65);
            margin-left: 8px;
        }
        .breadcrumb span {
            color: rgba(255, 255, 255, 0.85);
        }

        /* дё»еёғеұҖ */
        .main-container {
            display: flex;
            height: calc(100vh - 48px);
            overflow: hidden;
        }

        /* ең°еӣҫеҢәеҹҹ */
        .map-area {
            flex: 1;
            position: relative;
            background: #fafbfc;
            min-width: 0;
            overflow: hidden;
        }
        .map-area canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        .map-area canvas:active {
            cursor: grabbing;
        }

        /* дё»йўҳеӣҫеұӮеҲҮжҚўж ?*/
        .layer-tabs {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            padding: 4px;
            gap: 2px;
            z-index: 10;
        }
        .layer-tab {
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition);
            white-space: nowrap;
            border: 1px solid transparent;
            user-select: none;
        }
        .layer-tab:hover {
            color: var(--primary);
            background: #f0f5ff;
        }
        .layer-tab.active {
            color: #fff;
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 2px 6px rgba(22, 119, 255, 0.3);
        }

        /* жҗңзҙўжЎ?*/
        .search-box {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 10;
            display: flex;
            gap: 0;
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }
        .search-box input {
            width: 240px;
            padding: 9px 14px;
            border: none;
            outline: none;
            font-size: 13px;
            color: var(--text);
        }
        .search-box input::placeholder {
            color: #bfbfbf;
        }
        .search-box button {
            padding: 9px 16px;
            border: none;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            transition: var(--transition);
            white-space: nowrap;
        }
        .search-box button:hover {
            background: #4096ff;
        }

        /* жҗңзҙўз»“жһңдёӢжӢү */
        .search-results {
            position: absolute;
            top: 100%;
            right: 0;
            width: 280px;
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            margin-top: 4px;
            display: none;
            z-index: 11;
            max-height: 200px;
            overflow-y: auto;
        }
        .search-results.show {
            display: block;
        }
        .search-result-item {
            padding: 10px 14px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #f5f5f5;
            transition: var(--transition);
        }
        .search-result-item:hover {
            background: #f0f5ff;
        }
        .search-result-item .name {
            font-weight: 500;
        }
        .search-result-item .detail {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }

        /* еӣҫдҫӢ */
        .map-legend {
            position: absolute;
            bottom: 20px;
            left: 16px;
            background: rgba(255, 255, 255, 0.96);
            border-radius: var(--radius);
            padding: 12px 16px;
            box-shadow: var(--shadow-md);
            font-size: 11px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 10;
            backdrop-filter: blur(6px);
        }
        .map-legend .legend-title {
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 2px;
            color: var(--text);
        }
        .map-legend .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .map-legend .legend-color {
            width: 24px;
            height: 4px;
            border-radius: 2px;
            flex-shrink: 0;
        }
        .map-legend .legend-label {
            color: #666;
        }

        /* дҝЎжҒҜзӘ?*/
        .map-tooltip {
            position: absolute;
            background: #fff;
            border-radius: var(--radius);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            padding: 16px 20px;
            font-size: 13px;
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.18s;
            min-width: 260px;
            border: 1px solid #eee;
        }
        .map-tooltip.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .map-tooltip .tt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f5f5f5;
        }
        .map-tooltip .tt-name {
            font-weight: 600;
            font-size: 15px;
        }
        .map-tooltip .tt-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: 500;
        }
        .tt-status.open {
            background: #f6ffed;
            color: #52c41a;
        }
        .tt-status.suspended {
            background: #fff7e6;
            color: #fa8c16;
        }
        .tt-status.closed {
            background: #fff2f0;
            color: #ff4d4f;
        }
        .map-tooltip .tt-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            color: #666;
            font-size: 12px;
        }
        .map-tooltip .tt-row span:last-child {
            color: #1f1f1f;
            font-weight: 500;
        }
        .map-tooltip .tt-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }
        .map-tooltip .tt-tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: #f0f5ff;
            color: #1677ff;
        }
        .map-tooltip .tt-close {
            position: absolute;
            top: 8px;
            right: 10px;
            cursor: pointer;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            background: #f5f5f5;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            color: #999;
        }
        .map-tooltip .tt-close:hover {
            background: #e8e8e8;
            color: #333;
        }

        /* з©әзҠ¶жҖҒжҸҗзӨ?*/
        .empty-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 28px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            text-align: center;
            z-index: 15;
            display: none;
            font-size: 14px;
            color: #666;
        }
        .empty-hint.show {
            display: block;
        }
        .empty-hint .icon {
            font-size: 36px;
            margin-bottom: 8px;
        }
        .empty-hint .hint-text {
            margin-bottom: 4px;
        }
        .empty-hint .hint-sub {
            font-size: 12px;
            color: #999;
        }

        /* еҸідҫ§йқўжқҝ */
        .side-panel {
            width: 340px;
            background: #fff;
            display: flex;
            flex-direction: column;
            box-shadow: -2px 0 8px rgba(0, 0, 0, 0.06);

        .side-panel .panel-header {

            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;

        .side-panel .panel-header .count-badge {
            background: #f0f5ff;
            color: #1677ff;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
        }
        .side-panel .filter-section {
            padding: 14px 20px;
            border-bottom: 1px solid #f5f5f5;
            flex-shrink: 0;
        }
        .side-panel .filter-section .filter-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .side-panel .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }
        .side-panel .filter-chip {
            padding: 5px 12px;
            border-radius: 14px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #d9d9d9;
            background: #fff;
            transition: var(--transition);
            user-select: none;
            white-space: nowrap;
        }
        .side-panel .filter-chip:hover {
            border-color: #1677ff;
            color: #1677ff;
        }
        .side-panel .filter-chip.active {
            background: #1677ff;
            color: #fff;
            border-color: #1677ff;
        }
        .side-panel .filter-select {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 12px;
            outline: none;
            margin-bottom: 8px;
            color: #333;
            background: #fff;
            cursor: pointer;
        }
        .side-panel .filter-select:focus {
            border-color: #1677ff;
            box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.1);
        }
        .side-panel .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }
        .side-panel .btn-reset {
            flex: 1;
            padding: 7px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            font-size: 12px;
            transition: var(--transition);
            color: #666;
        }
        .side-panel .btn-reset:hover {
            border-color: #1677ff;
            color: #1677ff;
        }
        .side-panel .road-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }
        .side-panel .road-list::-webkit-scrollbar {
            width: 4px;
        }
        .side-panel .road-list::-webkit-scrollbar-thumb {
            background: #d9d9d9;
            border-radius: 2px;
        }
        .road-item {
            display: flex;
            align-items: center;
            padding: 11px 16px;
            border-bottom: 1px solid #fafafa;
            cursor: pointer;
            transition: var(--transition);
            gap: 10px;
        }
        .road-item:hover {
            background: #fafafa;
        }
        .road-item.selected {
            background: #e6f4ff;
            border-left: 3px solid #1677ff;
        }
        .road-item .road-color-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .road-item .road-info {
            flex: 1;
            min-width: 0;
        }
        .road-item .road-name {
            font-weight: 500;
            font-size: 13px;
        }
        .road-item .road-meta {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .road-item .road-tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            flex-shrink: 0;
        }
        .tag-open {
            background: #f6ffed;
            color: #52c41a;
        }
        .tag-suspended {
            background: #fff7e6;
            color: #fa8c16;
        }
        .tag-closed {
            background: #fff2f0;
            color: #ff4d4f;
        }

        /* е“Қеә”еј?*/
        @media (max-width: 900px) {
            .side-panel {
                width: 100%;
                height: 35vh;
                flex-shrink: 0;
            }
            .main-container {
                flex-direction: column;
            }
            .layer-tabs {
                flex-wrap: wrap;
                top: 8px;
                left: 8px;
            }
            .layer-tab {
                padding: 5px 10px;
                font-size: 11px;
            }
            .search-box input {
                width: 160px;
            }
        }
    </style>
</head>

                        if (road.facilities.includes('RSU')) icons.push('рҹ“Ў');
                        if (road.facilities.includes('жҝҖе…үйӣ·иҫ?)) icons.push('рҹ”ҙ');
                        if (road.facilities.includes('ж‘„еғҸеӨ?)) icons.push('рҹ“·');
                        icons.forEach((icon, i) => {
                            ctx.font = `${Math.max(10,13*mapScale)}px sans-serif`;
                            ctx.fillText(icon, midX + 10 + i * 18 * mapScale, midY + 12 * mapScale);
                        });
                    }
                });
            }

            // дёӯеҝғеҚҒеӯ—
            ctx.strokeStyle = 'rgba(0,0,0,0.06)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(w / 2 - 8, h / 2);
            ctx.lineTo(w / 2 + 8, h / 2);
            ctx.moveTo(w / 2, h / 2 - 8);
            ctx.lineTo(w / 2, h / 2 + 8);
            ctx.stroke();
        }

        function renderLoop() {
            drawMap();
            animationId = requestAnimationFrame(renderLoop);
        }

        // ==================== йҒ“и·ҜеҲ—иЎЁжёІжҹ“ ====================
        function renderRoadList() {
            const filtered = getFilteredRoads();
            roadCount.textContent = `е…?${filtered.length} жқЎ`;
            let html = '';
            if (filtered.length === 0) {
                html = '<div style="text-align:center;padding:30px;color:#999;">жҡӮж— еҢ№й…ҚйҒ“и·Ҝ</div>';
            }
            filtered.forEach(r => {
                const isSelected = r.id === selectedRoadId;
                const color = getLayerColor(r);
                let statusTag = '';
                if (r.status === 'ејҖж”?) statusTag = '<span class="road-tag tag-open">ејҖж”?/span>';
                else if (r.status === 'жҡӮеҒң') statusTag = '<span class="road-tag tag-suspended">жҡӮеҒң</span>';
                else statusTag = '<span class="road-tag tag-closed">е…ій—ӯ</span>';
                html += `
                <div class="road-item${isSelected ? ' selected' : ''}" onclick="selectRoad('${r.id}')">
                    <span class="road-color-dot" style="background:${color};"></span>
                    <div class="road-info">
                        <div class="road-name">${r.name}</div>
                        <div class="road-meta">${r.district} В· ${r.level} В· ${r.length}m В· и®ҫж–Ҫ: ${r.facilities.length>0 ? r.facilities.join('/') : 'ж—?}</div>
                    </div>
                    ${statusTag}
                </div>`;
            });
            roadList.innerHTML = html;
        }

        function selectRoad(id) {
            selectedRoadId = id;
            const road = roadData.find(r => r.id === id);
            if (road) {
                const w = mapCanvas.width / window.devicePixelRatio;
                const h = mapCanvas.height / window.devicePixelRatio;
                const baseLat = 32.045;
                const baseLng = 112.140;
                const scaleX = 7000 * mapScale;
                const scaleY = 5500 * mapScale;
                const midLat = (road.points[0].lat + road.points[1].lat) / 2;
                const midLng = (road.points[0].lng + road.points[1].lng) / 2;
                mapOffsetX = -(midLng - baseLng) * scaleX;
                mapOffsetY = (midLat - baseLat) * scaleY;
                showTooltip(road);
            }
            renderRoadList();
        }

        function showTooltip(road) {
            const w = mapCanvas.width / window.devicePixelRatio;
            const h = mapCanvas.height / window.devicePixelRatio;
            const midLat = (road.points[0].lat + road.points[1].lat) / 2;
            const midLng = (road.points[0].lng + road.points[1].lng) / 2;
            const pt = geoToPixel(midLat, midLng, w, h);
            const color = getLayerColor(road);
            let statusClass = road.status === 'ејҖж”? ? 'open' : road.status === 'жҡӮеҒң' ? 'suspended' : 'closed';
            tooltipContent.innerHTML = `
                <div class="tt-header">
                    <span class="tt-name">${road.name}</span>
                    <span class="tt-status ${statusClass}">${road.status}</span>
                </div>
                <div class="tt-row"><span>йҒ“и·Ҝзј–еҸ·</span><span>${road.id}</span></div>
                <div class="tt-row"><span>жүҖеұһеҢәеҹ?/span><span>${road.district}</span></div>
                <div class="tt-row"><span>йҒ“и·Ҝзӯүзә§</span><span>${road.level}</span></div>
                <div class="tt-row"><span>иҪҰйҒ“ж•?/span><span>${road.lanes} иҪҰйҒ“</span></div>
                <div class="tt-row"><span>и·Ҝж®өй•ҝеәҰ</span><span>${road.length} зұ?/span></div>
                <div class="tt-row"><span>ејҖж”ҫж—¶ж®?/span><span>${road.openHours}</span></div>
                <div class="tt-row"><span>йҖӮз”ЁиҮӘеҠЁй©ҫй©¶зӯүзә§</span><span>${road.adLevels.join(' / ')}</span></div>
                <div class="tt-row"><span>йҖӮз”ЁдёҡеҠЎзұ»еһӢ</span><span>${road.bizTypes.join(' / ')}</span></div>
                ${activeLayer==='complexity' ? `<div class="tt-row"><span>еӨҚжқӮеәҰеҫ—еҲ?/span><span style="color:${color}">${road.complexity}</span></div>` : ''}
                ${activeLayer==='risk' ? `<div class="tt-row"><span>йЈҺйҷ©еҫ—еҲҶ</span><span style="color:${color}">${road.risk}</span></div>` : ''}
                ${activeLayer==='scene' ? `<div class="tt-row"><span>еңәжҷҜйҖӮй…Қ</span><span style="color:${color}">${road.sceneFit}</span></div>` : ''}
                ${activeLayer==='level' ? `<div class="tt-row"><span>ејҖж”ҫзӯүзә?/span><span style="color:${color}">${road.openLevel}</span></div>` : ''}
                <div class="tt-tags">
                    ${road.scenes.map(s=>`<span class="tt-tag">${s}</span>`).join('')}
                    ${road.facilities.map(f=>`<span class="tt-tag" style="background:#fff7e6;color:#fa8c16;">${f}</span>`).join('')}
                </div>
            `;
            mapTooltip.classList.add('visible');
            const tipX = Math.min(pt.x + 20, w - 280);
            const tipY = Math.max(10, pt.y - 100);
            mapTooltip.style.left = tipX + 'px';
            mapTooltip.style.top = tipY + 'px';
        }

        function closeTooltip() {
            mapTooltip.classList.remove('visible');
            selectedRoadId = null;
            renderRoadList();
        }

        // ==================== зӯӣйҖүдәӨдә?====================
        function toggleChip(chip, filterType) {
            const parent = chip.parentElement;
            const chips = parent.querySelectorAll('.filter-chip');
            const value = chip.dataset.value;

            if (value === 'all') {
                chips.forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                updateFilter(filterType, 'all');
            } else {
                const allChip = parent.querySelector('[data-value="all"]');
                if (allChip) allChip.classList.remove('active');
                chip.classList.toggle('active');
                const activeChips = parent.querySelectorAll('.filter-chip.active');
                if (activeChips.length === 0) {
                    if (allChip) allChip.classList.add('active');
                    updateFilter(filterType, 'all');
                } else {
                    const values = Array.from(activeChips).map(c => c.dataset.value);
                    updateFilter(filterType, values[0]); // еҚ•йҖүжЁЎеј?                }
            }
            applyFilters();
        }

        function updateFilter(filterType, value) {
            switch (filterType) {
                case 'scene':
                    filters.scene = value;
                    break;
                case 'facility':
                    filters.facility = value;
                    break;
                case 'status':
                    filters.status = value;
                    break;
                case 'adLevel':
                    filters.adLevel = value;
                    break;
            }
        }

        function applyFilters() {
            filters.district = document.getElementById('filterDistrict').value;
            filters.roadType = document.getElementById('filterRoadType').value;
            selectedRoadId = null;
            mapTooltip.classList.remove('visible');
            renderRoadList();
        }

        function resetAllFilters() {
            filters = { district: 'all', scene: 'all', facility: 'all', status: 'all', roadType: 'all',
            adLevel: 'all' };
            document.getElementById('filterDistrict').value = 'all';
            document.getElementById('filterRoadType').value = 'all';
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.filter-chip[data-value="all"]').forEach(c => c.classList.add('active'));
            selectedRoadId = null;
            mapTooltip.classList.remove('visible');
            searchInput.value = '';
            searchResults.classList.remove('show');
            renderRoadList();
        }

        function handleSearchInput(val) {
            if (!val || val.trim() === '') {
                searchResults.classList.remove('show');
                return;
            }
            const q = val.toLowerCase().trim();
            const matched = roadData.filter(r =>
                r.name.toLowerCase().includes(q) || r.id.toLowerCase().includes(q)
            );
            if (matched.length > 0) {
                let html = '';
                matched.forEach(r => {
                    html += `
                    <div class="search-result-item" onclick="searchSelectRoad('${r.id}')">
                        <div class="name">${r.name}</div>
                        <div class="detail">${r.id} В· ${r.district} В· ${r.level}</div>
                    </div>`;
                });
                searchResults.innerHTML = html;
                searchResults.classList.add('show');
            } else {
                searchResults.innerHTML =
                    '<div style="padding:10px 14px;font-size:12px;color:#999;">жңӘжүҫеҲ°еҢ№й…ҚйҒ“и·?/div>';
                searchResults.classList.add('show');
            }
        }

        function searchSelectRoad(id) {
            searchResults.classList.remove('show');
            searchInput.value = roadData.find(r => r.id === id)?.name || '';
            selectRoad(id);
        }

        // ==================== еӣҫеұӮеҲҮжҚў ====================
        document.getElementById('layerTabs').addEventListener('click', (e) => {
            if (e.target.classList.contains('layer-tab')) {
                document.querySelectorAll('.layer-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                activeLayer = e.target.dataset.layer;
                selectedRoadId = null;
                mapTooltip.classList.remove('visible');
                getLayerLegend();
                renderRoadList();
            }
        });

        // ==================== ең°еӣҫдәӢд»¶ ====================
        mapArea.addEventListener('mousedown', (e) => {
            if (e.target === mapCanvas) {
                isDragging = true;
                dragStartX = e.clientX - mapOffsetX;
                dragStartY = e.clientY - mapOffsetY;
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                mapOffsetX = e.clientX - dragStartX;
                mapOffsetY = e.clientY - dragStartY;
            }
            if (!isDragging && e.target === mapCanvas) {
                const rect = mapCanvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                const w = mapCanvas.width / window.devicePixelRatio;
                const h = mapCanvas.height / window.devicePixelRatio;
                let found = null;
                const filtered = getFilteredRoads();
                for (const road of [...filtered].reverse()) {
                    const startPt = geoToPixel(road.points[0].lat, road.points[0].lng, w, h);
                    const endPt = geoToPixel(road.points[1].lat, road.points[1].lng, w, h);
                    const dist = pointToSegmentDist(mx, my, startPt.x, startPt.y, endPt.x, endPt.y);
                    if (dist < 14) { found = road; break; }
                }
                if (found && found.id !== hoveredRoadId) {
                    hoveredRoadId = found.id;
                    mapCanvas.style.cursor = 'pointer';
                } else if (!found && hoveredRoadId) {
                    hoveredRoadId = null;
                    mapCanvas.style.cursor = 'grab';
                }
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            if (mapCanvas) mapCanvas.style.cursor = hoveredRoadId ? 'pointer' : 'grab';
        });

        mapCanvas.addEventListener('click', (e) => {
            if (isDragging) return;
            const rect = mapCanvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const w = mapCanvas.width / window.devicePixelRatio;
            const h = mapCanvas.height / window.devicePixelRatio;
            const filtered = getFilteredRoads();
            for (const road of [...filtered].reverse()) {
                const startPt = geoToPixel(road.points[0].lat, road.points[0].lng, w, h);
                const endPt = geoToPixel(road.points[1].lat, road.points[1].lng, w, h);
                const dist = pointToSegmentDist(mx, my, startPt.x, startPt.y, endPt.x, endPt.y);
                if (dist < 14) {
                    selectRoad(road.id);
                    return;
                }
            }
            closeTooltip();
        });

        mapArea.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            mapScale = Math.max(0.3, Math.min(3, mapScale * delta));
        });

        function pointToSegmentDist(px, py, x1, y1, x2, y2) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const lenSq = dx * dx + dy * dy;
            if (lenSq === 0) return Math.sqrt((px - x1) ** 2 + (py - y1) ** 2);
            let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
            t = Math.max(0, Math.min(1, t));
            const nearX = x1 + t * dx;
            const nearY = y1 + t * dy;
            return Math.sqrt((px - nearX) ** 2 + (py - nearY) ** 2);
        }

        document.addEventListener('click', (e) => {
            if (!searchResults.contains(e.target) && e.target !== searchInput) {
                searchResults.classList.remove('show');
            }
        });

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeTooltip(); });

        // ==================== еҲқе§ӢеҢ?====================
        function init() {
            resizeCanvas();
            getLayerLegend();
            renderRoadList();
            renderLoop();
        }

        window.addEventListener('resize', () => { resizeCanvas(); });
        init();

        console.log('рҹ—әпё?йҒ“и·Ҝиө„жәҗеҸҜи§ҶеҢ–е·Іе°ұз»Ә | дё»йўҳеӣҫеұӮ + ж•°жҚ®иҝҮж»Өеҷ?| йҒ“и·ҜжҖ»ж•°: ' + roadData.length + ' жқ?);
    </script>
</body>
</html>
