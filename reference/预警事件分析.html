<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预警事件分析</title>
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --primary: #1890ff;
            --primary-hover: #40a9ff;
            --primary-bg: #e6f7ff;
            --success: #52c41a;
            --warning: #faad14;
            --error: #f5222d;
            --text-primary: #262626;
            --text-secondary: #595959;
            --text-tertiary: #8c8c8c;
            --border: #d9d9d9;
            --border-light: #f0f0f0;
            --bg: #f0f2f5;
            --bg-white: #fff;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-card: 0 1px 2px -2px rgba(0, 0, 0, 0.08), 0 3px 6px 0 rgba(0, 0, 0, 0.06);
            --radius: 6px;
            --radius-lg: 8px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei',
                sans-serif;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.5715;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .app-header {
            background: #001529;
            color: #fff;
            padding: 0 32px;
            height: 56px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }
        .app-header .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .app-header .logo .icon {
            width: 34px;
            height: 34px;
            border-radius: var(--radius);
            background: var(--warning);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .app-body {
            max-width: 1500px;
            margin: 0 auto;
            padding: 20px 28px 40px;
        }
        .page-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .page-subtitle {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-bottom: 18px;
        }
        .query-bar {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            padding: 16px 22px;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 14px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 130px;
        }
        .form-group label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        select,
        input {
            height: 34px;
            padding: 0 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 13px;
            font-family: var(--font);
            color: var(--text-primary);
            background: #fff;
            outline: none;
            min-width: 120px;
        }
        select[multiple] {
            height: auto;
            min-height: 34px;
            padding: 6px 8px;
        }
        select:focus,
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.12);
        }
        .btn {
            height: 34px;
            padding: 0 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: var(--font);
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 2px 8px rgba(24, 144, 255, 0.35);
        }
        .btn-outline {
            background: #fff;
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary-bg);
        }
        .btn-sm {
            height: 28px;
            padding: 0 12px;
            font-size: 12px;
        }
        .btn-link {
            background: transparent;
            color: var(--primary);
            border: none;
            padding: 0 4px;
            height: auto;
            cursor: pointer;
            font-weight: 500;
            font-size: 12px;
        }
        .btn-link:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        .stat-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            padding: 18px 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: 0.2s;
        }
        .stat-card:hover {
            box-shadow: var(--shadow-card);
            transform: translateY(-1px);
        }
        .stat-card .stat-label {
            font-size: 12px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        .stat-card .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }
        .stat-card .stat-sub {
            font-size: 11px;
            color: var(--text-tertiary);
        }
        .stat-card.accent-red {
            border-left: 3px solid var(--error);
        }
        .stat-card.accent-orange {
            border-left: 3px solid var(--warning);
        }
        .stat-card.accent-blue {
            border-left: 3px solid var(--primary);
        }
        .stat-card.accent-green {
            border-left: 3px solid var(--success);
        }

        .card {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            margin-bottom: 16px;
        }
        .card-header {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            letter-spacing: 0.3px;
        }
        .chart-container {
            min-height: 300px;
        }
        .map-container {
            height: 380px;
            border-radius: 6px;
            overflow: hidden;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .row-1 {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        .table-wrap {
            overflow-x: auto;
            margin-top: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            background: #fafafa;
            padding: 11px 14px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-light);
            white-space: nowrap;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        td {
            padding: 10px 14px;
            border-bottom: 1px solid #f5f5f5;
            color: var(--text-primary);
        }
        tbody tr {
            transition: 0.2s;
            cursor: pointer;
        }
        tbody tr:hover {
            background: #fafafa;
        }
        .tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
            white-space: nowrap;
        }
        .tag-red {
            background: #fff1f0;
            color: #cf1322;
        }
        .tag-orange {
            background: #fff7e6;
            color: #d46b08;
        }
        .tag-green {
            background: #f6ffed;
            color: #389e0d;
        }
        .tag-blue {
            background: #e6f7ff;
            color: #096dd9;
        }
        .tag-purple {
            background: #f9f0ff;
            color: #722ed1;
        }

        .pagination-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 14px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .pagination-bar select {
            width: 80px;
            height: 30px;
        }
        .pagination-bar .page-info {
            font-weight: 500;
        }
        .pagination-bar .btn-sm {
            height: 30px;
        }

        .modal-mask {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-mask.show {
            display: flex;
        }
        .modal {
            background: #fff;
            border-radius: 8px;
            width: 680px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
        }
        .modal-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
            font-size: 15px;
        }
        .modal-body {
            padding: 20px 24px;
            overflow-y: auto;
            flex: 1;
            font-size: 13px;
            line-height: 2;
        }
        .modal-body .detail-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 20px;
        }
        .modal-body .detail-row .dl {
            color: var(--text-tertiary);
            font-size: 11px;
            text-transform: uppercase;
        }
        .modal-body .detail-row .dv {
            font-weight: 500;
            color: var(--text-primary);
        }

        @media (max-width: 1200px) {
            .stat-cards {
                grid-template-columns: repeat(2, 1fr);
            }
            .row-2 {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 768px) {
            .stat-cards {
                grid-template-columns: 1fr;
            }
            .query-bar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="logo">
            <span class="icon">⚠️</span>
            <span>预警事件分析</span>
        </div>
    </header>

    <div class="app-body">
        <div class="page-title">预警事件分析</div>
        <div class="page-subtitle">智能网联汽车道路测试 · 预警事件趋势、事故率关联与热点地图</div>

        <!-- 筛选条件 -->
        <div class="query-bar">
            <div class="form-group">
                <label>时间范围</label>
                <div style="display:flex;gap:6px;align-items:center;">
                    <input type="date" value="2026-04-01" style="min-width:130px;">
                    <span style="color:var(--text-tertiary);">—</span>
                    <input type="date" value="2026-05-08" style="min-width:130px;">
                </div>
            </div>
            <div class="form-group">
                <label>事件类型</label>
                <select multiple>
                    <option selected>全部</option>
                    <option>碰撞预警</option>
                    <option>车道偏离预警</option>
                    <option>行人碰撞预警</option>
                    <option>交通标识预警</option>
                    <option>前车碰撞预警</option>
                </select>
            </div>
            <div class="form-group">
                <label>行政区域</label>
                <select>
                    <option>全部</option>
                    <option>樊城区</option>
                    <option>襄城区</option>
                    <option>襄州区</option>
                    <option>南漳县</option>
                    <option>谷城县</option>
                </select>
            </div>
            <div class="form-group">
                <label>处理状态</label>
                <select>
                    <option>全部</option>
                    <option>已处理</option>
                    <option>未处理</option>
                    <option>处理中</option>
                </select>
            </div>
            <button class="btn btn-primary">🔍 查询</button>
            <button class="btn btn-outline">📥 导出Excel</button>
        </div>

        <!-- 统计卡片 -->
        <div class="stat-cards">
            <div class="stat-card accent-red">
                <span class="stat-label">预警事件总数</span>
                <span class="stat-value" style="color:#f5222d;">1,852</span>
                <span class="stat-sub">统计周期内累计</span>
            </div>
            <div class="stat-card accent-orange">
                <span class="stat-label">未处理事件</span>
                <span class="stat-value" style="color:#fa8c16;">156</span>
                <span class="stat-sub">占比 8.4%</span>
            </div>
            <div class="stat-card accent-blue">
                <span class="stat-label">关联事故数</span>
                <span class="stat-value" style="color:#1890ff;">48</span>
                <span class="stat-sub">预警→事故转化率 2.6%</span>
            </div>
            <div class="stat-card accent-green">
                <span class="stat-label">平均响应时间</span>
                <span class="stat-value" style="color:#52c41a;">2.3<span style="font-size:14px;">s</span></span>
                <span class="stat-sub">系统预警延迟</span>
            </div>
        </div>

        <!-- 图表区第一行 -->
        <div class="row-2">
            <div class="card">
                <div class="card-header">预警事件趋势（近30天）</div>
                <div class="chart-container" id="chartTrend"></div>
            </div>
            <div class="card">
                <div class="card-header">事件类型分布</div>
                <div class="chart-container" id="chartTypePie"></div>
            </div>
        </div>

        <!-- 图表区第二行 -->
        <div class="row-2">
            <div class="card">
                <div class="card-header">事故率关联分析（各企业）</div>
                <div class="chart-container" id="chartScatter"></div>
            </div>
            <div class="card">
                <div class="card-header">预警事件热点地图</div>
                <div id="hotspotMap" class="map-container"></div>
            </div>
        </div>

        <!-- 事件列表 -->
        <div class="card">
            <div class="card-header">预警事件列表</div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>事件编号</th>
                            <th>时间</th>
                            <th>事件类型</th>
                            <th>车牌号</th>
                            <th>VIN码</th>
                            <th>所属企业</th>
                            <th>地点</th>
                            <th>关联事故</th>
                            <th>处理状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="eventTableBody"></tbody>
                </table>
            </div>
            <div class="pagination-bar">
                <span>共 <b id="totalCount">1852</b> 条</span>
                <select id="pageSizeSelect">
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
                <span>条/页</span>
                <button class="btn btn-sm btn-outline" id="prevBtn">上一页</button>
                <span class="page-info">第 <b id="currPage">1</b> / <b id="totalPage">186</b> 页</span>
                <button class="btn btn-sm btn-outline" id="nextBtn">下一页</button>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal-mask" id="modalMask">
        <div class="modal">
            <div class="modal-header">
                <span id="modalTitle">预警事件详情</span>
                <button class="btn btn-sm btn-outline" onclick="closeModal()">✕ 关闭</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        (function() {
            // 模拟数据生成
            const eventTypes = ['碰撞预警', '车道偏离预警', '行人碰撞预警', '交通标识预警', '前车碰撞预警'];
            const companies = ['襄阳智行科技', '汉江出行', '顺捷科技', '东风出行', '百度Apollo', '滴滴自动驾驶', '小马智行', '文远知行',
            'AutoX'];
            const plates = [
                '鄂F·A1234', '鄂F·B5678', '鄂F·C3456', '鄂F·D7890', '鄂F·E9012',
                '鄂F·F4567', '鄂F·G8901', '鄂F·H2345', '鄂F·I6789', '鄂F·J0123',
                '鄂F·K3456', '鄂F·L7890', '鄂F·M1234', '鄂F·N5678', '鄂F·O9012'
            ];
            const vins = [
                'LSVAA4189N2000001', 'LSVAA4189N2000002', 'LSVAA4189N2000003',
                'LSVAA4189N2000004', 'LSVAA4189N2000005', 'LSVAA4189N2000006',
                'LSVAA4189N2000007', 'LSVAA4189N2000008', 'LSVAA4189N2000009',
                'LSVAA4189N2000010', 'LSVAA4189N2000011', 'LSVAA4189N2000012',
                'LSVAA4189N2000013', 'LSVAA4189N2000014', 'LSVAA4189N2000015'
            ];
            const locations = [
                '长虹路与建华路交叉口', '檀溪路与铁佛寺路交叉口', '航空路与金富士路交叉口',
                '人民路天元四季城前', '建设路与银城大道交叉口', '金源路中段',
                '卧龙大道与中原路交叉口', '大庆路与人民路交叉口', '环城南路与檀溪路交叉口',
                '前进路与长征路交叉口'
            ];
            const statuses = ['已处理', '未处理', '处理中'];

            function randomEl(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

            function generateEvents(count = 1852) {
                const arr = [];
                for (let i = 0; i < count; i++) {
                    const date = new Date(2026, 3, 1);
                    date.setDate(date.getDate() + Math.floor(Math.random() * 38));
                    date.setHours(Math.floor(Math.random() * 24), Math.floor(Math.random() * 60), Math.floor(Math
                        .random() * 60));
                    const type = randomEl(eventTypes);
                    const plateIdx = Math.floor(Math.random() * plates.length);
                    const hasAccident = Math.random() < 0.06; // 6%关联事故
                    arr.push({
                        id: 'EVT-2026-' + String(i + 1).padStart(5, '0'),
                        time: date.toISOString().replace('T', ' ').substring(0, 19),
                        type: type,
                        plate: plates[plateIdx],
                        vin: vins[plateIdx],
                        company: randomEl(companies),
                        location: randomEl(locations),
                        accidentId: hasAccident ? 'ACC-2026-' + String(Math.floor(Math.random() * 200) + 1)
                            .padStart(4, '0') : '-',
                        status: hasAccident ? (Math.random() > 0.5 ? '已处理' : '处理中') : randomEl(statuses),
                    });
                }
                arr.sort((a, b) => b.time.localeCompare(a.time));
                return arr;
            }

            const allEvents = generateEvents(1852);
            let currentPage = 1;
            let pageSize = 10;

            function renderTable(page = 1) {
                const tbody = document.getElementById('eventTableBody');
                const start = (page - 1) * pageSize;
                const end = Math.min(start + pageSize, allEvents.length);
                const pageData = allEvents.slice(start, end);

                tbody.innerHTML = pageData.map(e => {
                    const typeTag = e.type === '碰撞预警' ? 'tag-red' : e.type === '车道偏离预警' ?
                        'tag-orange' : e.type === '行人碰撞预警' ? 'tag-purple' : 'tag-blue';
                    const statusTag = e.status === '已处理' ? 'tag-green' : e.status === '处理中' ?
                        'tag-orange' : 'tag-red';
                    return `<tr onclick="openDetail('${e.id}')" style="cursor:pointer;">
                        <td><strong>${e.id}</strong></td>
                        <td>${e.time}</td>
                        <td><span class="tag ${typeTag}">${e.type}</span></td>
                        <td>${e.plate}</td>
                        <td style="font-family:monospace;font-size:11px;">${e.vin}</td>
                        <td>${e.company}</td>
                        <td>${e.location}</td>
                        <td>${e.accidentId !== '-' ? `<a href="#" onclick="event.stopPropagation();" class="btn-link">${e.accidentId}</a>` : '-'}</td>
                        <td><span class="tag ${statusTag}">${e.status}</span></td>
                    <td><button class="btn-link btn-sm" onclick="event.stopPropagation();openDetail('${e.id}')">详情</button></td>
                </tr>`;
            }).join('');

            document.getElementById('totalCount').textContent = allEvents.length;
            document.getElementById('currPage').textContent = page;
            document.getElementById('totalPage').textContent = Math.ceil(allEvents.length / pageSize);
        }

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentPage > 1) { currentPage--;
                renderTable(currentPage); }
        });
        document.getElementById('nextBtn').addEventListener('click', () => {
            const totalPages = Math.ceil(allEvents.length / pageSize);
            if (currentPage < totalPages) { currentPage++;
                renderTable(currentPage); }
        });
        document.getElementById('pageSizeSelect').addEventListener('change', function() {
            pageSize = parseInt(this.value);
            currentPage = 1;
            renderTable(currentPage);
        });

        window.openDetail = function(id) {
            const evt = allEvents.find(e => e.id === id) || allEvents[0];
            const typeTag = evt.type === '碰撞预警' ? 'tag-red' : evt.type === '车道偏离预警' ? 'tag-orange' : evt
                .type === '行人碰撞预警' ? 'tag-purple' : 'tag-blue';
            const html = `
                <div class="detail-row">
                    <div><span class="dl">事件编号</span><br><span class="dv">${evt.id}</span></div>
                    <div><span class="dl">时间</span><br><span class="dv">${evt.time}</span></div>
                    <div><span class="dl">事件类型</span><br><span class="tag ${typeTag}">${evt.type}</span></div>
                    <div><span class="dl">车牌号</span><br><span class="dv">${evt.plate}</span></div>
                    <div><span class="dl">VIN码</span><br><span class="dv" style="font-family:monospace;">${evt.vin}</span></div>
                    <div><span class="dl">所属企业</span><br><span class="dv">${evt.company}</span></div>
                    <div><span class="dl">地点</span><br><span class="dv">${evt.location}</span></div>
                    <div><span class="dl">关联事故</span><br><span class="dv">${evt.accidentId !== '-' ? evt.accidentId : '无'}</span></div>
                    <div><span class="dl">处理状态</span><br><span class="tag ${evt.status==='已处理'?'tag-green':evt.status==='处理中'?'tag-orange':'tag-red'}">${evt.status}</span></div>
                </div>
                <hr style="margin:14px 0;border-color:var(--border-light);">
                <p style="font-weight:600;">关联车辆近期预警</p>
                <p>该车辆近7天共触发预警 <b>5</b> 次，其中碰撞预警 2 次。</p>
            `;
            document.getElementById('modalTitle').textContent = '预警事件详情 - ' + evt.id;
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modalMask').classList.add('show');
        };
        window.closeModal = function() { document.getElementById('modalMask').classList.remove('show'); };
        document.getElementById('modalMask').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ---------- ECharts 图表初始化 ----------
        const chartInstances = {};
        function initChart(id) {
            const dom = document.getElementById(id);
            if (!dom) return null;
            if (chartInstances[id]) chartInstances[id].dispose();
            const chart = echarts.init(dom);
            chartInstances[id] = chart;
            return chart;
        }

        // 预警事件趋势折线图
        const chartTrend = initChart('chartTrend');
        const trendDays = [];
        const trendData = [];
        for (let i = 29; i >= 0; i--) {
            const d = new Date(2026, 4, 8);
            d.setDate(d.getDate() - i);
            trendDays.push((d.getMonth() + 1) + '/' + d.getDate());
            trendData.push(Math.floor(40 + Math.random() * 40));
        }
        chartTrend.setOption({
            tooltip: { trigger: 'axis' },
            grid: { left: 45, right: 20, top: 10, bottom: 40 },
            xAxis: { type: 'category', data: trendDays, axisLabel: { rotate: 45, fontSize: 10 } },
            yAxis: { type: 'value', name: '事件数' },
            series: [{
                type: 'line',
                data: trendData,
                smooth: true,
                lineStyle: { color: '#fa8c16', width: 2 },
                areaStyle: { color: 'rgba(250,140,22,0.12)' },
                itemStyle: { color: '#fa8c16' },
            }],
        });

        // 事件类型分布饼图
        const chartTypePie = initChart('chartTypePie');
        chartTypePie.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: {c} 起 ({d}%)' },
            legend: { bottom: 0, textStyle: { fontSize: 11 } },
            series: [{
                type: 'pie',
                radius: ['50%', '75%'],
                center: ['50%', '46%'],
                itemStyle: { borderRadius: 5, borderColor: '#fff', borderWidth: 2 },
                label: { formatter: '{b}\n{d}%', fontSize: 10 },
                data: [
                    { value: 520, name: '碰撞预警', itemStyle: { color: '#f5222d' } },
                    { value: 480, name: '车道偏离预警', itemStyle: { color: '#fa8c16' } },
                    { value: 350, name: '行人碰撞预警', itemStyle: { color: '#722ed1' } },
                    { value: 280, name: '交通标识预警', itemStyle: { color: '#1890ff' } },
                    { value: 222, name: '前车碰撞预警', itemStyle: { color: '#13c2c2' } },
                ],
            }],
        });

        // 事故率关联散点图
        const chartScatter = initChart('chartScatter');
        const scatterData = companies.map(c => ({
            name: c,
            value: [Math.floor(300 + Math.random() * 600), (Math.random() * 5 + 0.5).toFixed(2),
            Math.floor(10 + Math.random() * 30)
            ],
        }));
        chartScatter.setOption({
            tooltip: {
                trigger: 'item',
                formatter: function(p) { return p.name + '<br/>预警事件数：' + p.value[0] + '<br/>事故率：' + p.value[1] +
                        '%<br/>车辆数：' + p.value[2]; }
            },
            grid: { left: 60, right: 30, top: 10, bottom: 40 },
            xAxis: { type: 'value', name: '预警事件数', nameLocation: 'center', nameGap: 30 },
            yAxis: { type: 'value', name: '事故率（%）' },
            series: [{
                type: 'scatter',
                data: scatterData,
                symbolSize: function(val) { return val[2] * 0.8; },
                itemStyle: { color: '#1890ff', borderColor: '#fff', borderWidth: 1 },
                label: { show: true, formatter: '{b}', position: 'top', fontSize: 10 },
            }],
        });

        // Leaflet 热点地图
        let hotspotMap;
        function initHotspotMap() {
            const container = document.getElementById('hotspotMap');
            if (!container) return;
            if (hotspotMap) { hotspotMap.remove();
                hotspotMap = null; }
            hotspotMap = L.map(container).setView([32.02, 112.12], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' })
                .addTo(hotspotMap);
            // 生成预警事件点位（颜色区分类型）
            const typeColor = {
                '碰撞预警': '#f5222d',
                '车道偏离预警': '#fa8c16',
                '行人碰撞预警': '#722ed1',
                '交通标识预警': '#1890ff',
                '前车碰撞预警': '#13c2c2',
            };
            for (let i = 0; i < 150; i++) {
                const lat = 31.76 + Math.random() * 0.35;
                const lng = 111.70 + Math.random() * 0.55;
                const type = randomEl(eventTypes);
                L.circleMarker([lat, lng], {
                    radius: 4 + Math.random() * 4,
                    fillColor: typeColor[type],
                    color: '#fff',
                    weight: 1,
                    fillOpacity: 0.7,
                }).addTo(hotspotMap).bindPopup(`<b>${type}</b><br/>地点：${randomEl(locations)}`);
            }
        }

        function resizeAllCharts() {
            Object.values(chartInstances).forEach(c => { if (c && !c.isDisposed()) c.resize(); });
            if (hotspotMap) hotspotMap.invalidateSize();
        }
        window.addEventListener('resize', () => {
            clearTimeout(window._resizeTimer);
            window._resizeTimer = setTimeout(resizeAllCharts, 200);
        });

        // 初始渲染
        renderTable(1);
        initHotspotMap();
        })();
    </script>
</body>
</html>
