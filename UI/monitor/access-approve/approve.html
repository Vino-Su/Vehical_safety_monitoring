function getFilteredData(){
  var data=[].concat(approveData);
  var appId=document.getElementById('filterAppId').value.trim().toUpperCase();
  if(appId)data=data.filter(function(d){return d.id.toUpperCase().indexOf(appId)>-1;});
  if(currentStatus==='todo')data=data.filter(function(d){return d.status==='审批中';});
  else if(currentStatus==='processing')data=data.filter(function(d){return d.status==='审批中';});
  else if(currentStatus==='passed')data=data.filter(function(d){return d.status==='已通过';});
  else if(currentStatus==='rejected')data=data.filter(function(d){return d.status==='已退回';});
  return data;
}

function switchStatusTab(el,status){
  currentStatus=status;
  currentPage=1;
  document.querySelectorAll('.ant-tab').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
  renderTable();
}

function renderTable(){
  var data=getFilteredData();
  var total=data.length;
  var totalPages=Math.ceil(total/pageSize)||1;
  if(currentPage>totalPages)currentPage=totalPages;
  var start=(currentPage-1)*pageSize;
  var pageData=data.slice(start,start+pageSize);
  var html='';
  pageData.forEach(function(d){
    var nodeTag=d.node==='已完成'?'<span class="ant-tag ant-tag-success">已完成</span>':d.node==='已退回'?'<span class="ant-tag ant-tag-error">已退回</span>':'<span class="ant-tag ant-tag-processing">'+d.node+'</span>';
    var statusTag=d.status==='审批中'?'<span class="ant-tag ant-tag-processing">审批中</span>':d.status==='已通过'?'<span class="ant-tag ant-tag-success">已通过</span>':'<span class="ant-tag ant-tag-error">已退回</span>';
    var ops='<button class="ant-btn-link" onclick="openDetail(\''+d.id+'\',\''+d.type+'\')">查看详情</button>';
    if(d.status==='审批中')ops+='<button class="ant-btn-link" onclick="openApprove(\''+d.id+'\',\''+d.type+'\',\''+d.node+'\')">审批</button>';
    html+='<tr><td>'+d.id+'</td><td>'+d.type+'</td><td>'+d.company+'</td><td>'+d.time+'</td><td>'+nodeTag+'</td><td>'+statusTag+'</td><td class="flex gap-1">'+ops+'</td></tr>';
  });
  document.getElementById('approveTbody').innerHTML=html;
  document.getElementById('totalCount').textContent='共 '+total+' 条';
  var pgHtml='<span class="page-item'+(currentPage<=1?' disabled':'')+'" onclick="goPage('+(currentPage-1)+')">‹</span>';
  for(var i=1;i<=totalPages;i++){
    pgHtml+='<span class="page-item'+(i===currentPage?' active':'')+'" onclick="goPage('+i+')">'+i+'</span>';
  }
  pgHtml+='<span class="page-item'+(currentPage>=totalPages?' disabled':'')+'" onclick="goPage('+(currentPage+1)+')">›</span>';
  pgHtml+=' <span class="text-sm text-[#00000073] ml-2">'+pageSize+' 条/页</span>';
  document.getElementById('paginationBar').innerHTML=pgHtml;
}

function goPage(p){
  var data=getFilteredData();
  var totalPages=Math.ceil(data.length/pageSize)||1;
  if(p<1||p>totalPages)return;
  currentPage=p;
  renderTable();
}

function resetFilter(){
  document.getElementById('filterAppId').value='';
  document.getElementById('filterType').innerHTML='全部 <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>';
  document.getElementById('filterDateFrom').value='2026-04-01';
  document.getElementById('filterDateTo').value='2026-04-30';
  currentPage=1;
  renderTable();
}

function makeDetailHtml(appId){
  var d=approveData.find(function(x){return x.id===appId;});
  if(!d)return '';
  var isRT=d.id.indexOf('RT')===0;
  var isDA=d.id.indexOf('DA')===0;
  var isDO=d.id.indexOf('DO')===0;
  var typeLabel=isRT?'道路测试':isDA?'示范应用':'示范运营';
  var periodLabel=isRT?'测试日期':typeLabel+'时间段';
  var roadLabel=typeLabel+'路段';
  var vehicleLabel=typeLabel+'车辆';
  var statusTag=d.status==='审批中'?'<span class="ant-tag ant-tag-processing">审批中</span>':d.status==='已通过'?'<span class="ant-tag ant-tag-success">已通过</span>':'<span class="ant-tag ant-tag-error">已退回</span>';
  var h='';
  h+='<div class="ant-descriptions">';
  h+='<div class="ant-descriptions-row"><div class="ant-descriptions-label">申请编号</div><div class="ant-descriptions-value">'+d.id+'</div><div class="ant-descriptions-label">申请类型</div><div class="ant-descriptions-value">'+d.type+'</div><div class="ant-descriptions-label">申请子类型</div><div class="ant-descriptions-value">'+d.subType+'</div></div>';
  h+='<div class="ant-descriptions-row"><div class="ant-descriptions-label">申请主体</div><div class="ant-descriptions-value">'+d.company+'</div><div class="ant-descriptions-label">项目负责人</div><div class="ant-descriptions-value">'+d.manager+'</div><div class="ant-descriptions-label">联系方式</div><div class="ant-descriptions-value">'+d.managerPhone+'</div></div>';
  h+='<div class="ant-descriptions-row"><div class="ant-descriptions-label">'+periodLabel+'</div><div class="ant-descriptions-value">'+d.testPeriod+'</div><div class="ant-descriptions-label">申请状态</div><div class="ant-descriptions-value">'+statusTag+'</div><div class="ant-descriptions-label">申请时间</div><div class="ant-descriptions-value">'+d.time+'</div></div>';
  h+='</div>';
  h+='<h4 class="text-sm font-semibold text-[#000000d9] mb-2 mt-4 pb-2 border-b border-[#f0f0f0]">'+roadLabel+'</h4>';
  h+='<div style="overflow-x:auto"><table class="ant-table" style="width:100%;font-size:13px"><thead><tr><th>序号</th><th>道路名称</th><th>道路类型</th><th>道路状态</th></tr></thead><tbody>';
  if(d.roads){d.roads.forEach(function(r,i){h+='<tr><td>'+(i+1)+'</td><td>'+r.name+'</td><td>'+r.type+'</td><td><span class="ant-tag '+(r.status==='开放'?'ant-tag-success':'ant-tag-default')+'">'+r.status+'</span></td></tr>';});}
  h+='</tbody></table></div>';
  h+='<h4 class="text-sm font-semibold text-[#000000d9] mb-2 mt-4 pb-2 border-b border-[#f0f0f0]">'+vehicleLabel+'</h4>';
  h+='<div style="overflow-x:auto"><table class="ant-table" style="width:100%;font-size:13px"><thead><tr><th>序号</th><th>VIN码</th><th>品牌</th><th>型号</th><th>自动驾驶级别</th></tr></thead><tbody>';
  if(d.vehicles){d.vehicles.forEach(function(v,i){h+='<tr><td>'+(i+1)+'</td><td class="font-mono text-xs">'+v.vin+'</td><td>'+v.brand+'</td><td>'+v.model+'</td><td><span class="ant-tag '+(v.level==='L4'?'ant-tag-success':'ant-tag-processing')+'">'+v.level+'</span></td></tr>';});}
  h+='</tbody></table></div>';
  h+='<h4 class="text-sm font-semibold text-[#000000d9] mb-2 mt-4 pb-2 border-b border-[#f0f0f0]">申请材料</h4>';
  h+='<div class="space-y-2 text-sm">';
  if(d.materials){d.materials.forEach(function(m){h+='<div class="flex items-center gap-2"><span class="text-[#52c41a]">✓</span>'+m+' <button class="ant-btn-link ant-btn-sm">预览</button><button class="ant-btn-link ant-btn-sm">下载</button></div>';});}
  h+='</div>';
  return h;
}

function makeApproveModal(title,detailHtml,currentNode,appId){
  var body='<div>'+detailHtml+makeFlowLog(appId)+
    '<div style="position:sticky;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #f0f0f0;padding:8px 16px 12px;margin:-24px -24px -24px -24px">'+
    '<div class="text-xs text-[#00000050] flex items-center gap-4 mb-3">'+
      '<span><span class="text-[#00000030]">当前节点：</span><span class="ant-tag ant-tag-processing text-[10px]">'+currentNode+'</span></span>'+
      '<span><span class="text-[#00000030]">审批角色：</span>'+(currentNode.indexOf('第三方')>-1?'第三方服务机构':'联席小组')+'</span>'+
    '</div>'+
    '<div class="flex items-center gap-4">'+
      '<div class="flex items-center gap-4 shrink-0">'+
        '<label class="flex items-center gap-1.5 cursor-pointer text-sm"><input type="radio" name="result" checked> 通过</label>'+
        '<label class="flex items-center gap-1.5 cursor-pointer text-sm"><input type="radio" name="result"> 退回</label>'+
      '</div>'+
      '<div class="w-px h-6 bg-[#e8e8e8]"></div>'+
      '<input type="text" class="ant-input text-sm flex-1" placeholder="审批意见（选填）"/>'+
      '<div class="flex items-center gap-2 shrink-0">'+
        '<button class="ant-btn" onclick="closeModal()">取消</button>'+
        '<button class="ant-btn ant-btn-primary" onclick="closeModal()">确定</button>'+
      '</div>'+
    '</div>'+
    '</div></div>';
  openModal(title,body,{wide:true,footer:''});
}

function openDetail(appId,typeName){
  openModal(typeName+' - 详情',makeDetailHtml(appId)+makeFlowLog(appId),{wide:true,footer:'<button class="ant-btn" onclick="closeModal()">关闭</button>'});
}

function openApprove(appId,typeName,currentNode){
  makeApproveModal(typeName+' - 审批',makeDetailHtml(appId),currentNode,appId);
}
