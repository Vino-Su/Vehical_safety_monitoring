    .detail-group-title{font-size:14px;font-weight:600;color:#000000d9;padding:8px 12px;background:#fafafa;border-radius:6px;margin-bottom:8px;border-left:3px solid #1677ff}

    .ant-checkbox-item{display:inline-flex;align-items:center;gap:4px;cursor:pointer;font-size:13px;color:#000000d9}
    .ant-checkbox-item input[type="checkbox"]{appearance:none;width:16px;height:16px;border:1px solid #d9d9d9;border-radius:3px;cursor:pointer;position:relative;flex-shrink:0}
    .ant-checkbox-item input[type="checkbox"]:checked{border-color:#1677ff;background:#1677ff}
    .ant-checkbox-item input[type="checkbox"]:checked::after{content:'✓';position:absolute;top:-1px;left:2px;font-size:12px;color:#fff;font-weight:700}
    .check-items-panel{background:#fafafa;border:1px solid #f0f0f0;border-radius:6px;padding:10px 14px;margin-top:8px;display:none}
    .check-items-panel.visible{display:block}
    .check-items-panel .panel-title{font-size:12px;color:#00000073;margin-bottom:6px}
  </style>
</head>

function renderTable(){
  var tbody=document.getElementById('vehicleTableBody');
  var html='';
  vehicleData.forEach(function(d,i){
    html+='<tr><td><input type="checkbox" class="ant-checkbox"></td><td class="font-mono text-xs">'+d.vin+'</td><td>'+d.company+'</td><td>'+d.brand+'</td><td>'+d.model+'</td><td><span class="ant-tag '+(d.driverLevel==='L4'?'ant-tag-success':'ant-tag-processing')+'">'+d.driverLevel+'</span></td><td>'+d.tempPlate+'</td><td>'+d.regTime+'</td><td class="flex gap-1"><button class="ant-btn-link" onclick="openDetailModal('+i+')">详情</button><button class="ant-btn-link" onclick="openAddModal('+i+')">编辑</button><button class="ant-btn-link danger">删除</button></td></tr>';
  });
  tbody.innerHTML=html;
  document.getElementById('totalCount').textContent=vehicleData.length;
}

function radioHtml(name,value,checked,label,onclick){
  return '<label class="ant-radio"><input type="radio" name="'+name+'" value="'+value+'" '+(checked?'checked':'')+(onclick?' onclick="'+onclick+'"':'')+'>'+label+'</label>';
}

function formField(label,required,inputHtml){
  return '<div class="ant-form-item"><div class="ant-form-label">'+(required?'<span class="required">*</span>':'')+label+'</div><div class="ant-form-control">'+inputHtml+'</div></div>';

function openAddModal(index){
  var d=index!==undefined?vehicleData[index]:null;
  openModal((d?'编辑':'新增')+'车辆信息',buildFormHtml(d),{wide:true,footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="closeModal()">'+(d?'保存修改':'提交创建')+'</button>'});
}

function descRow(label,value,half){
  return '<div class="ant-descriptions-row"><div class="ant-descriptions-label">'+label+'</div><div class="ant-descriptions-value">'+(value||'-')+'</div>'+(half?'':'')+'</div>';
}

function descRow2(pairs){
  var h='<div class="ant-descriptions-row">';
  pairs.forEach(function(p){h+='<div class="ant-descriptions-label">'+p[0]+'</div><div class="ant-descriptions-value">'+(p[1]||'-')+'</div>';});
  h+='</div>';
  return h;
}

function openDetailModal(index){
  var d=vehicleData[index]||vehicleData[0];
  var h='';

  h+='<div class="detail-group"><div class="detail-group-title">基本信息</div>';
  h+='<div class="ant-descriptions">';
  h+=descRow2([['所属企业',d.company],['VIN码','<span class="font-mono">'+d.vin+'</span>']]);
  h+=descRow2([['产品商标',d.brand],['产品型号',d.model]]);
  h+=descRow2([['自动驾驶级别','<span class="ant-tag '+(d.driverLevel==='L4'?'ant-tag-success':'ant-tag-processing')+'">'+d.driverLevel+'</span>'],['临牌号（最新）',d.tempPlate]]);
  h+=descRow2([['登记时间',d.regTime]]);
  h+='</div></div>';

  h+='<div class="detail-group"><div class="detail-group-title">车辆参数</div>';
  h+='<div class="ant-descriptions">';

  h+=descRow2([['最大设计总质量(kg)',d.maxDesignMass],['对应轴荷(kg)',d.maxAxleLoad]]);
  h+=descRow2([['非自动驾驶模式下最高车速(km/h)',d.nonAutoMaxSpeed],['自动驾驶模式设计最高车速(km/h)',d.autoMaxSpeed]]);
  h+=descRow2([['轮胎型号',d.tireModel],['标准胎压',d.tirePressure]]);

  h+='</div></div>';

  h+='<div class="detail-group"><div class="detail-group-title">总成信息 — 动力系统</div>';
  h+='<div class="ant-descriptions">';
  h+=descRow2([['驱动型式',d.driveType],['发动机型号',d.engineModel]]);

  h+=descRow2([['电池生产厂家',d.batteryMfr],['变速器型号',d.transModel]]);
  h+=descRow2([['变速器生产厂家',d.transMfr]]);
  h+='</div></div>';

  h+='<div class="detail-group"><div class="detail-group-title">总成信息 — 转向系统</div>';
  h+='<div class="ant-descriptions">';
  h+=descRow2([['转向系统型式',d.steerType],['转向机型号',d.steerModel]]);
  h+=descRow2([['转向机生产厂家',d.steerMfr]]);
  h+='</div></div>';

  h+='<div class="detail-group"><div class="detail-group-title">总成信息 — 制动系统</div>';
  h+='<div class="ant-descriptions">';
  h+=descRow2([['制动系统型式',d.brakeType],['制动器型号',d.brakeModel]]);
  h+=descRow2([['制动器生产厂家',d.brakeMfr],['ESC型号',d.escModel]]);
  h+=descRow2([['ESC生产厂家',d.escMfr]]);

  h+='<div class="detail-group"><div class="detail-group-title">其他改装情况</div>';

  h+=descRow('其他改装情况说明',d.otherModify);
  h+='</div></div>';

  h+='<div class="detail-group"><div class="detail-group-title">技术路线</div>';
  h+='<div class="ant-descriptions">';
  h+=descRow2([['是否采用传感器技术','<span class="ant-tag '+(d.useSensor==='是'?'ant-tag-success':'ant-tag-default')+'">'+d.useSensor+'</span>'],['是否采用网联技术','<span class="ant-tag '+(d.useV2X==='是'?'ant-tag-success':'ant-tag-default')+'">'+d.useV2X+'</span>']]);
  h+=descRow2([['是否采用高精地图','<span class="ant-tag '+(d.useHdMap==='是'?'ant-tag-success':'ant-tag-default')+'">'+d.useHdMap+'</span>'],['自动驾驶任务输入方式','<span class="ant-tag ant-tag-processing">'+d.taskInput+'</span>']]);
  h+='</div>';

  if(d.useSensor==='是'&&d.sensorItems&&d.sensorItems.length>0){

    d.sensorItems.forEach(function(sid){var item=sensorCheckItems.find(function(x){return x.id===sid});if(item)h+='<span class="ant-tag ant-tag-processing text-xs">'+item.id+'. '+item.name+'</span>';});

    d.v2xItems.forEach(function(sid){var item=sensorCheckItems.find(function(x){return x.id===sid});if(item)h+='<span class="ant-tag ant-tag-processing text-xs">'+item.id+'. '+item.name+'</span>';});
    h+='</div></div>';
  }
  if(d.useHdMap==='是'&&d.hdMapItems&&d.hdMapItems.length>0){
    h+='<div style="margin-top:8px"><div class="text-xs text-[#00000073] mb-1">高精地图对应检测项目：</div><div class="flex flex-wrap gap-1">';
    d.hdMapItems.forEach(function(sid){var item=sensorCheckItems.find(function(x){return x.id===sid});if(item)h+='<span class="ant-tag ant-tag-processing text-xs">'+item.id+'. '+item.name+'</span>';});
    h+='</div></div>';
  }
  if(d.taskItems&&d.taskItems.length>0){
    h+='<div style="margin-top:8px"><div class="text-xs text-[#00000073] mb-1">自动驾驶任务输入方式对应检测项目：</div><div class="flex flex-wrap gap-1">';

  openModal('车辆详情 — '+d.brand+' '+d.model,h,{wide:true,footer:'<button class="ant-btn" onclick="closeModal()">关闭</button>'});
}

function toggleCheckPanel(panelId,selectedValue){
  var panel=document.getElementById(panelId);
  if(!panel)return;
  if(selectedValue==='是'||(panelId==='taskItems'&&(selectedValue==='人工'||selectedValue==='系统'))){
    panel.classList.add('visible');
  }else{
    panel.classList.remove('visible');
    var checks=panel.querySelectorAll('input[type="checkbox"]');
    checks.forEach(function(c){c.checked=false;});
  }
}
