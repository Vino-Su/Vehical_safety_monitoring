  {id:'INF20260427001',title:'关于开展2026年度智能网联汽车道路测试安全专项检查工作的通知',type:'公告公示',subType:'政策通知',scope:'全部企业',dept:'联席小组办公室',creator:'平台运营管理员',status:'已发布',createTime:'2026-04-26 14:00',publishTime:'2026-04-27 09:00',publisher:'平台运营管理员',content:'为加强智能网联汽车道路测试安全管理，保障公共交通安全，根据《智能网联汽车道路测试与示范应用管理规范》要求，决定开展2026年度安全专项检查工作。检查范围包括：测试车辆安全性能、自动驾驶系统运行状态、测试驾驶员资质、安全管理制度执行情况等。请各相关企业于2026年5月15日前完成自查并提交自查报告。'},
  {id:'INF20260425001',title:'关于近期恶劣天气下自动驾驶测试注意事项的通知',type:'公告公示',subType:'安全预警',scope:'全部企业',dept:'安全管理办公室',creator:'安全管理员',status:'已发布',createTime:'2026-04-24 16:00',publishTime:'2026-04-25 16:00',publisher:'安全管理员',content:'根据气象部门预报，近期我市将出现持续强降雨天气，路面湿滑、能见度低，对自动驾驶系统传感器感知和决策能力构成较大挑战。请各测试企业注意：1.恶劣天气期间减少或暂停自动驾驶测试；2.必须测试时需配备安全员全程监控；3.加强传感器清洁维护；4.遇到异常情况立即切换人工驾驶模式。'},

function getStatusTag(status){
  var map={'草稿':'ant-tag-default','待审核':'ant-tag-processing','已发布':'ant-tag-success','已撤回':'ant-tag-warning'};
  return '<span class="ant-tag '+(map[status]||'ant-tag-default')+'">'+status+'</span>';
}
function getTypeTag(type){
  var map={'公告公示':'ant-tag-processing','办事指南':'ant-tag-default','测试示范报告':'ant-tag-warning'};
  return '<span class="ant-tag '+(map[type]||'ant-tag-default')+'">'+type+'</span>';
}

function renderTable(tbodyId,items,cols){
  var tbody=document.getElementById(tbodyId);
  if(!tbody)return;
  var html='';
  items.forEach(function(d){
    html+='<tr>';
    cols.forEach(function(c){
      if(c==='type')html+='<td>'+getTypeTag(d.type)+'</td>';
      else if(c==='status')html+='<td>'+getStatusTag(d.status)+'</td>';
      else if(c==='actions')html+='<td class="flex gap-1">'+getActions(d)+'</td>';
      else html+='<td>'+(d[c]||'—')+'</td>';
    });
    html+='</tr>';
  });
  tbody.innerHTML=html;
}

function getActions(d){
  var btns='';
  btns+='<button class="ant-btn-link" onclick="openViewModal(\''+d.id+'\')">查看</button>';
  if(d.status==='草稿'){
    btns+='<button class="ant-btn-link" onclick="openEditModal(\''+d.id+'\')">编辑</button>';
    btns+='<button class="ant-btn-link" onclick="submitReview(\''+d.id+'\')">提交审核</button>';
    btns+='<button class="ant-btn-link danger" onclick="deleteItem(\''+d.id+'\')">删除</button>';
  }else if(d.status==='待审核'){
    btns+='<button class="ant-btn-link" onclick="approveItem(\''+d.id+'\')">审核通过</button>';
    btns+='<button class="ant-btn-link danger" onclick="rejectItem(\''+d.id+'\')">退回</button>';
  }else if(d.status==='已发布'){
    btns+='<button class="ant-btn-link" style="color:#faad14" onclick="withdrawItem(\''+d.id+'\')">撤回</button>';
  }else if(d.status==='已撤回'){
    btns+='<button class="ant-btn-link" onclick="openEditModal(\''+d.id+'\')">重新编辑</button>';
  }
  return btns;
}

function refreshTables(){
  var all=publishData;
  var draft=all.filter(function(d){return d.status==='草稿'});
  var pending=all.filter(function(d){return d.status==='待审核'});
  var published=all.filter(function(d){return d.status==='已发布'});
  var withdrawn=all.filter(function(d){return d.status==='已撤回'});

  renderTable('tbody-all',all,['id','title','type','creator','status','createTime','actions']);
  renderTable('tbody-draft',draft,['id','title','type','creator','createTime','actions']);
  renderTable('tbody-pending',pending,['id','title','type','creator','createTime','actions']);
  renderTable('tbody-published',published,['id','title','type','publisher','publishTime','actions']);
  renderTable('tbody-withdrawn',withdrawn,['id','title','type','withdrawBy','withdrawTime','actions']);

  document.getElementById('count-all').textContent='共 '+all.length+' 条';
  document.getElementById('count-draft').textContent='共 '+draft.length+' 条';
  document.getElementById('count-pending').textContent='共 '+pending.length+' 条';
  document.getElementById('count-published').textContent='共 '+published.length+' 条';
  document.getElementById('count-withdrawn').textContent='共 '+withdrawn.length+' 条';
}

function switchTab(el,tabId){
  document.querySelectorAll('.ant-tab').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
  ['tab-all','tab-draft','tab-pending','tab-published','tab-withdrawn'].forEach(function(id){
    document.getElementById(id).style.display=id===tabId?'':'none'
  });
}

function submitReview(id){
  var d=publishData.find(function(x){return x.id===id});
  if(d){d.status='待审核';refreshTables();}
}
function approveItem(id){
  var d=publishData.find(function(x){return x.id===id});
  if(d){d.status='已发布';d.publishTime='2026-04-30 10:00';d.publisher='平台运营管理员';refreshTables();}
}
function rejectItem(id){
  var d=publishData.find(function(x){return x.id===id});
  if(d){d.status='草稿';refreshTables();}
}
function withdrawItem(id){
  var d=publishData.find(function(x){return x.id===id});
  if(d){d.status='已撤回';d.withdrawTime='2026-04-30 11:00';d.withdrawBy='平台运营管理员';refreshTables();}
}
function deleteItem(id){
  var idx=publishData.findIndex(function(x){return x.id===id});
  if(idx>-1){publishData.splice(idx,1);refreshTables();}
}

function toggleCreateFields(type){
  document.getElementById('create-fields-announce').style.display=type==='公告公示'?'':'none';
  document.getElementById('create-fields-guide').style.display=type==='办事指南'?'':'none';
  document.getElementById('create-fields-report').style.display=type==='测试示范报告'?'':'none';
}

    typeFields='<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>子类型</div><div class="ant-form-control"><select class="ant-input" style="cursor:pointer"><option>'+(d.subType||'')+'</option><option>政策通知</option><option>安全预警</option><option>法规文件</option><option>工作通报</option></select></div></div>' +
      '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>发布范围</div><div class="ant-form-control"><select class="ant-input" style="cursor:pointer"><option>'+(d.scope||'')+'</option><option>全部企业</option><option>已准入企业</option><option>特定企业</option></select></div></div>' +
      '<div class="ant-form-item"><div class="ant-form-label">发布部门</div><div class="ant-form-control"><input class="ant-input" value="'+(d.dept||'')+'"></div></div>';
  }else if(d.type==='办事指南'){
    typeFields='<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>适用对象</div><div class="ant-form-control"><input class="ant-input" value="'+(d.object||'')+'"></div></div>' +
      '<div class="ant-form-item"><div class="ant-form-label">发布部门</div><div class="ant-form-control"><input class="ant-input" value="'+(d.dept||'')+'"></div></div>';
  }else if(d.type==='测试示范报告'){
    typeFields='<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>报告周期</div><div class="ant-form-control"><input class="ant-input" value="'+(d.period||'')+'"></div></div>' +
      '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>报告概述</div><div class="ant-form-control"><textarea class="ant-input" style="height:60px;padding:8px 12px">'+(d.overview||'')+'</textarea></div></div>' +
      '<div class="ant-form-item"><div class="ant-form-label">发布部门</div><div class="ant-form-control"><input class="ant-input" value="'+(d.dept||'')+'"></div></div>';

    {wide:true,footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn" onclick="closeModal()">保存为草稿</button><button class="ant-btn ant-btn-primary" onclick="closeModal()">提交审核</button>'});

function openViewModal(id){
  var d=publishData.find(function(x){return x.id===id});

  var html='<div class="ant-descriptions">' +
    '<div class="ant-descriptions-row"><div class="ant-descriptions-label">编号</div><div class="ant-descriptions-value">'+d.id+'</div><div class="ant-descriptions-label">信息类型</div><div class="ant-descriptions-value">'+getTypeTag(d.type)+'</div></div>' +
    '<div class="ant-descriptions-row"><div class="ant-descriptions-label">标题</div><div class="ant-descriptions-value" style="flex:3">'+d.title+'</div></div>' +
    '<div class="ant-descriptions-row"><div class="ant-descriptions-label">发布状态</div><div class="ant-descriptions-value">'+getStatusTag(d.status)+'</div><div class="ant-descriptions-label">创建人</div><div class="ant-descriptions-value">'+d.creator+'</div></div>';

  if(d.type==='公告公示'){
    html+='<div class="ant-descriptions-row"><div class="ant-descriptions-label">子类型</div><div class="ant-descriptions-value">'+(d.subType||'—')+'</div><div class="ant-descriptions-label">发布范围</div><div class="ant-descriptions-value">'+(d.scope||'—')+'</div></div>';
    html+='<div class="ant-descriptions-row"><div class="ant-descriptions-label">发布部门</div><div class="ant-descriptions-value">'+(d.dept||'—')+'</div>';
  }else if(d.type==='办事指南'){
    html+='<div class="ant-descriptions-row"><div class="ant-descriptions-label">适用对象</div><div class="ant-descriptions-value">'+(d.object||'—')+'</div><div class="ant-descriptions-label">发布部门</div><div class="ant-descriptions-value">'+(d.dept||'—')+'</div></div>';
  }else if(d.type==='测试示范报告'){
    html+='<div class="ant-descriptions-row"><div class="ant-descriptions-label">报告周期</div><div class="ant-descriptions-value">'+(d.period||'—')+'</div><div class="ant-descriptions-label">报告概述</div><div class="ant-descriptions-value">'+(d.overview||'—')+'</div></div>';
    html+='<div class="ant-descriptions-row"><div class="ant-descriptions-label">发布部门</div><div class="ant-descriptions-value">'+(d.dept||'—')+'</div>';
  }

  if(d.publishTime)html+='<div class="ant-descriptions-label">发布时间</div><div class="ant-descriptions-value">'+d.publishTime+'</div>';
  html+='</div>';

  html+='<h4 class="text-sm font-semibold text-[#000000d9] mt-4 mb-2 pb-2 border-b border-[#f0f0f0]">正文内容</h4>';

  openModal('查看详情 - '+d.id,html,{wide:true,footer:'<button class="ant-btn" onclick="closeModal()">关闭</button>'});
}
